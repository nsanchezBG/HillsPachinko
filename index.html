<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hill's Pachinko</title>
  <style>
    :root {
      --brand-font: "Gotham", "Gotham SSm", "Gotham Rounded", "Montserrat", "Avenir Next", "Proxima Nova", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --blue: #2d6eb8;
      --blue-mid: #3478c6;
      --blue-dark: #1d5599;
      --blue-deep: #0b3265;
      --chrome-a: #ffffff;
      --chrome-b: #d8e0e8;
      --chrome-c: #8e9aa8;
      --ink: #07111f;
      --muted: #41526c;
      --paper: #f8fbff;
      --paper-low: #e8eef8;
      --shadow: 0 26px 64px rgba(4, 30, 66, 0.42);
      --press-time: 110ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: start center;
      min-height: 100dvh;
      padding: 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0) 32%),
        linear-gradient(145deg, #3b7fc7 0%, var(--blue) 42%, #205a9e 72%, #174986 100%);
      color: var(--ink);
      font-family: var(--brand-font);
      overflow: auto;
      text-rendering: geometricPrecision;
    }

    .machine {
      position: relative;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: clamp(8px, 1.55vh, 13px);
      width: calc(100vw - 20px);
      max-width: 455px;
      padding: clamp(10px, 1.6vh, 14px) clamp(10px, 2.4vw, 14px) clamp(10px, 1.8vh, 14px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: clamp(20px, 5vw, 28px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0) 20%),
        linear-gradient(180deg, var(--blue-mid) 0%, var(--blue) 44%, var(--blue-dark) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.35),
        inset 0 -10px 22px rgba(9, 48, 98, 0.24),
        0 2px 0 rgba(255, 255, 255, 0.12),
        var(--shadow);
    }

    .board-frame {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 0;
      margin-top: clamp(18px, 4.6vw, 26px);
      padding: clamp(7px, 1.8vw, 10px);
      border-radius: clamp(38px, 9vw, 52px);
      background:
        linear-gradient(130deg, #ffffff 0%, #cad4df 13%, #6f7f91 25%, #f7fbff 39%, #a7b2bf 54%, #ffffff 69%, #788696 83%, #d7e1eb 100%);
      box-shadow:
        inset 0 3px 0 rgba(255, 255, 255, 0.95),
        inset 0 -4px 0 rgba(47, 60, 76, 0.54),
        inset 3px 0 4px rgba(255, 255, 255, 0.62),
        inset -4px 0 7px rgba(49, 64, 82, 0.36),
        0 2px 0 rgba(255, 255, 255, 0.28),
        0 7px 0 rgba(3, 31, 70, 0.34),
        0 14px 18px rgba(0, 18, 47, 0.48);
    }

    .board-blue-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      overflow: hidden;
      padding: clamp(3px, 0.8vw, 5px) clamp(15px, 4vw, 22px) clamp(5px, 1.4vw, 8px);
      border-radius: clamp(32px, 8vw, 45px);
      background:
        linear-gradient(90deg, #022353 0%, #0859b5 7%, #0a73d8 12%, #064086 18%, #064086 82%, #0a73d8 88%, #0859b5 93%, #022353 100%);
      box-shadow:
        inset 0 2px 0 rgba(112, 184, 255, 0.46),
        inset 0 -5px 10px rgba(0, 16, 48, 0.64),
        inset 8px 0 14px rgba(0, 16, 48, 0.58),
        inset -8px 0 14px rgba(0, 16, 48, 0.58),
        0 1px 0 rgba(255, 255, 255, 0.38);
    }

    .board-blue-shell::before,
    .board-blue-shell::after {
      content: "";
      position: absolute;
      z-index: 1;
      top: 8%;
      bottom: 9%;
      width: clamp(20px, 5.2vw, 30px);
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      background:
        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.98) 0%, rgba(255, 255, 255, 0.58) 24%, rgba(116, 194, 255, 0.2) 50%, rgba(116, 194, 255, 0) 74%);
      filter: blur(1.6px);
    }

    .board-blue-shell::before {
      left: clamp(4px, 1.3vw, 7px);
    }

    .board-blue-shell::after {
      right: clamp(4px, 1.3vw, 7px);
    }

    .board-inner-frame {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: clamp(6px, 1.6vw, 9px);
      border-radius: clamp(29px, 7.4vw, 40px);
      background:
        linear-gradient(145deg, #ffffff 0%, #dce5ef 15%, #8a99aa 28%, #ffffff 43%, #c5cfda 59%, #768799 74%, #f7fbff 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.96),
        inset 0 -3px 0 rgba(51, 66, 84, 0.5),
        inset 3px 0 5px rgba(255, 255, 255, 0.68),
        inset -4px 0 7px rgba(50, 65, 84, 0.28),
        0 0 0 1px rgba(255, 255, 255, 0.42),
        0 4px 8px rgba(0, 24, 62, 0.28);
    }

    .board-logo-plaque {
      position: absolute;
      z-index: 6;
      top: clamp(-48px, -10.6vw, -38px);
      left: 50%;
      display: grid;
      place-items: center;
      width: clamp(101px, 26.1vw, 122px);
      height: clamp(82px, 21vw, 100px);
      padding: 10px 14px 15px;
      transform: translateX(-50%);
      border: 2px solid transparent;
      border-radius: 0 0 17px 17px;
      background:
        linear-gradient(180deg, #ffffff 0%, #fbfdff 46%, #e5edf5 75%, #cbd7e4 100%) padding-box,
        linear-gradient(135deg, #ffffff 0%, #bac6d3 23%, #f7fbff 48%, #8b99a8 75%, #ffffff 100%) border-box;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.98),
        inset 0 -10px 18px rgba(43, 67, 94, 0.18),
        inset 5px 0 10px rgba(255, 255, 255, 0.42),
        inset -5px 0 10px rgba(56, 72, 90, 0.12),
        0 5px 0 rgba(28, 55, 91, 0.2),
        0 13px 18px rgba(4, 29, 69, 0.26);
    }

    .board-logo-plaque img {
      display: block;
      width: 92%;
      height: 92%;
      object-fit: contain;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 720 / 960;
      border: 0;
      border-radius: clamp(23px, 6.4vw, 34px);
      touch-action: none;
      background: #fbf8f2;
      box-shadow:
        inset 0 0 0 1px rgba(34, 64, 92, 0.24),
        0 1px 0 rgba(255, 255, 255, 0.96),
        0 10px 20px rgba(5, 30, 66, 0.18);
    }

    .hud {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: clamp(9px, 2.6vw, 13px);
      min-height: clamp(106px, 15.5vh, 124px);
    }

    button {
      border: 0;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.35);
      opacity: 0.62;
    }

    .score-card {
      justify-self: start;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      width: 100%;
      min-width: 0;
      height: clamp(94px, 13.7vh, 108px);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: clamp(18px, 5vw, 24px);
      background:
        linear-gradient(180deg, #ffffff 0%, var(--paper) 45%, var(--paper-low) 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.95),
        inset 0 -8px 15px rgba(41, 74, 115, 0.12),
        0 7px 0 rgba(10, 49, 101, 0.42),
        0 18px 28px rgba(8, 35, 75, 0.22);
    }

    .score-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 45%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .score-card > div {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    .score-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: #074c9f;
      font-size: clamp(17px, 4.7vw, 22px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .score-card strong {
      display: block;
      color: #074c9f;
      font-size: clamp(39px, 10vw, 52px);
      line-height: 0.82;
      font-weight: 950;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .logo {
      align-self: start;
      justify-self: end;
      width: clamp(58px, 15vw, 70px);
      height: clamp(58px, 15vw, 70px);
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 999px;
      background:
        linear-gradient(180deg, #ffffff 0%, #f6f8fb 54%, #dbe5ef 100%);
      object-fit: contain;
      margin-top: 2px;
      image-rendering: auto;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.96),
        inset 0 -8px 13px rgba(41, 70, 106, 0.12),
        0 6px 0 rgba(7, 48, 103, 0.44),
        0 14px 24px rgba(5, 31, 71, 0.24);
      filter:
        drop-shadow(0 1px 0 rgba(255, 255, 255, 0.22));
    }

    .roll {
      justify-self: end;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      width: min(164px, 37vw);
      min-width: 128px;
      height: clamp(84px, 12.4vh, 98px);
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: clamp(28px, 7.4vw, 42px);
      background:
        radial-gradient(ellipse at 50% 17%, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.08) 33%, rgba(255, 255, 255, 0) 49%),
        linear-gradient(180deg, #ff5e66 0%, #ed1c35 48%, #b90d27 100%);
      box-shadow:
        inset 0 3px 0 rgba(255, 255, 255, 0.42),
        inset 0 0 0 2px rgba(255, 255, 255, 0.18),
        inset 0 -12px 16px rgba(80, 0, 18, 0.28),
        inset 5px 0 10px rgba(255, 255, 255, 0.12),
        inset -5px 0 10px rgba(63, 0, 18, 0.22),
        0 3px 0 rgba(255, 255, 255, 0.28),
        0 8px 0 rgba(108, 7, 29, 0.95),
        0 12px 12px rgba(0, 16, 44, 0.52);
      transition: transform var(--press-time) ease, box-shadow var(--press-time) ease, filter var(--press-time) ease;
    }

    .roll::before {
      content: "";
      position: absolute;
      inset: 8% 8% 50%;
      border-radius: 999px 999px 40% 40%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.08) 70%, rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .roll:active:not(:disabled) {
      transform: translateY(6px) scale(0.985);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.22),
        inset 0 9px 18px rgba(65, 0, 16, 0.26),
        0 2px 0 rgba(255, 255, 255, 0.3),
        0 3px 0 rgba(103, 8, 30, 0.86),
        0 7px 9px rgba(0, 16, 44, 0.42);
    }

    .roll-text {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    .roll-text strong {
      font-size: clamp(27px, 7.8vw, 36px);
      line-height: 0.9;
      font-weight: 950;
      letter-spacing: 0;
      color: #ffffff;
      text-shadow: 0 2px 0 rgba(77, 0, 18, 0.32);
    }

    .roll-cost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: clamp(14px, 4vw, 19px);
      line-height: 1;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.94);
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .paw-icon {
      display: inline-block;
      width: 0.5em;
      height: 0.5em;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .paw-blue {
      filter: invert(23%) sepia(96%) saturate(1661%) hue-rotate(194deg) brightness(88%) contrast(101%);
      opacity: 0.5;
    }

    .paw-white {
      filter: invert(1) drop-shadow(0 1px 0 rgba(98, 0, 22, 0.35));
      opacity: 0.78;
    }

    .multipliers {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: clamp(6px, 1.8vw, 9px);
      width: 100%;
    }

    .multiplier {
      min-width: 0;
      height: clamp(48px, 7.4vh, 60px);
      border: 4px solid transparent;
      border-radius: clamp(9px, 2.5vw, 12px);
      background:
        linear-gradient(90deg, rgba(46, 66, 88, 0.38), rgba(255, 255, 255, 0.78) 11%, rgba(255, 255, 255, 0) 24%, rgba(0, 0, 0, 0.1) 100%) padding-box,
        linear-gradient(180deg, var(--m-top) 0%, var(--m-mid) 54%, var(--m-bottom) 100%) padding-box,
        linear-gradient(135deg, #ffffff 0%, #c9d2dc 16%, #6e7a88 31%, #ffffff 48%, #b7c0ca 62%, #5d6976 79%, #eef4fb 100%) border-box;
      color: var(--m-ink, #080b10);
      font-size: clamp(24px, 6.8vw, 34px);
      line-height: 1;
      font-weight: 650;
      letter-spacing: 0;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.56),
        inset 0 -6px 10px rgba(0, 0, 0, 0.09),
        inset 4px 0 8px rgba(255, 255, 255, 0.16),
        inset -4px 0 8px rgba(0, 0, 0, 0.12),
        0 4px 0 rgba(255, 255, 255, 0.36),
        0 7px 0 var(--m-edge),
        0 10px 10px rgba(0, 16, 44, 0.42);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.36);
      transition: transform var(--press-time) ease, box-shadow var(--press-time) ease, filter var(--press-time) ease;
    }

    .multiplier[data-count="1"] {
      --m-top: #ffffff;
      --m-mid: #eef3fb;
      --m-bottom: #d7e0ed;
      --m-edge: #aeb9c8;
      --m-ink: #074c9f;
    }

    .multiplier[data-count="2"] {
      --m-top: #ffffff;
      --m-mid: #cfd8e2;
      --m-bottom: #9ca9b6;
      --m-edge: #637080;
      --m-ink: #074c9f;
    }

    .multiplier[data-count="3"] {
      --m-top: #ffe889;
      --m-mid: #f6c532;
      --m-bottom: #d9a21b;
      --m-edge: #a77815;
      --m-ink: #074c9f;
    }

    .multiplier[data-count="5"] {
      --m-top: #ffb15f;
      --m-mid: #f5822e;
      --m-bottom: #d9651e;
      --m-edge: #a44716;
      --m-ink: #ffffff;
    }

    .multiplier[data-count="10"] {
      --m-top: #ff8b51;
      --m-mid: #f05d25;
      --m-bottom: #cb4218;
      --m-edge: #963011;
      --m-ink: #ffffff;
    }

    .multiplier.active {
      outline: 0;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.62),
        inset 0 -6px 10px rgba(0, 0, 0, 0.1),
        inset 4px 0 8px rgba(255, 255, 255, 0.16),
        inset -4px 0 8px rgba(0, 0, 0, 0.12),
        0 0 0 2px rgba(255, 255, 255, 0.92),
        0 0 0 4px rgba(8, 44, 92, 0.26),
        0 7px 0 var(--m-edge),
        0 11px 11px rgba(0, 16, 44, 0.46);
      transform: translateY(-2px);
      filter: saturate(1.06);
    }

    .multiplier:active {
      transform: translateY(5px);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.45),
        inset 0 5px 12px rgba(0, 0, 0, 0.15),
        0 1px 0 var(--m-edge),
        0 5px 7px rgba(0, 16, 44, 0.34);
    }

    .multiplier.active:active {
      transform: translateY(4px);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.48),
        inset 0 5px 12px rgba(0, 0, 0, 0.15),
        0 0 0 3px rgba(255, 255, 255, 0.82),
        0 1px 0 var(--m-edge),
        0 5px 7px rgba(0, 16, 44, 0.34);
    }

    .machine.slot-impact .board-blue-shell {
      animation: board-impact-drift 360ms cubic-bezier(0.2, 0.8, 0.28, 1) 8ms both;
    }

    .machine.slot-impact .board-inner-frame {
      animation: board-impact-noise 430ms cubic-bezier(0.2, 0.8, 0.28, 1) 36ms both;
    }

    .machine.slot-impact .score-card {
      animation: ui-impact-left 350ms cubic-bezier(0.18, 0.88, 0.26, 1) 18ms both;
    }

    .machine.slot-impact .roll {
      animation: ui-impact-right 410ms cubic-bezier(0.18, 0.88, 0.26, 1) 62ms both;
    }

    .machine.slot-impact .multiplier:nth-child(1) {
      animation: ui-impact-chip-a 320ms cubic-bezier(0.2, 0.84, 0.28, 1) 28ms both;
    }

    .machine.slot-impact .multiplier:nth-child(2) {
      animation: ui-impact-chip-b 380ms cubic-bezier(0.2, 0.84, 0.28, 1) 48ms both;
    }

    .machine.slot-impact .multiplier:nth-child(3) {
      animation: ui-impact-chip-a 350ms cubic-bezier(0.2, 0.84, 0.28, 1) 72ms both;
    }

    .machine.slot-impact .multiplier:nth-child(4) {
      animation: ui-impact-chip-b 420ms cubic-bezier(0.2, 0.84, 0.28, 1) 38ms both;
    }

    .machine.slot-impact .multiplier:nth-child(5) {
      animation: ui-impact-chip-a 360ms cubic-bezier(0.2, 0.84, 0.28, 1) 92ms both;
    }

    .machine.bumper-impact .board-blue-shell::before {
      animation: side-rail-glint 560ms ease-out both;
    }

    .machine.bumper-impact .board-blue-shell::after {
      animation: side-rail-glint 620ms ease-out 36ms both;
    }

    @keyframes board-impact-drift {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); filter: brightness(1); }
      18% { transform: translate3d(-1.4px, 1px, 0) rotate(-0.14deg); filter: brightness(1.035); }
      37% { transform: translate3d(1.7px, -0.8px, 0) rotate(0.16deg); }
      61% { transform: translate3d(-0.7px, 0.5px, 0) rotate(-0.08deg); }
      100% { transform: translate3d(0, 0, 0) rotate(0deg); filter: brightness(1); }
    }

    @keyframes board-impact-noise {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); }
      16% { transform: translate3d(1px, -0.8px, 0) rotate(0.09deg); }
      31% { transform: translate3d(-1.3px, 0.6px, 0) rotate(-0.12deg); }
      57% { transform: translate3d(0.8px, 0.3px, 0) rotate(0.05deg); }
      100% { transform: translate3d(0, 0, 0) rotate(0deg); }
    }

    @keyframes ui-impact-left {
      0% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1); }
      23% { transform: translate3d(1.2px, -0.8px, 0) scale(1.006); filter: brightness(1.045); }
      49% { transform: translate3d(-0.8px, 1px, 0) scale(0.998); }
      100% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1); }
    }

    @keyframes ui-impact-right {
      0% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1); }
      19% { transform: translate3d(-1px, 0.8px, 0) scale(1.005); filter: brightness(1.04); }
      44% { transform: translate3d(1.3px, -0.6px, 0) scale(0.999); }
      72% { transform: translate3d(-0.4px, 0.2px, 0) scale(1.002); }
      100% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1); }
    }

    @keyframes ui-impact-chip-a {
      0% { transform: translate3d(0, 0, 0); }
      35% { transform: translate3d(0.7px, -1px, 0); }
      68% { transform: translate3d(-0.7px, 0.6px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    @keyframes ui-impact-chip-b {
      0% { transform: translate3d(0, 0, 0); }
      28% { transform: translate3d(-0.8px, 0.7px, 0); }
      59% { transform: translate3d(0.6px, -0.8px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    @keyframes side-rail-glint {
      0% { opacity: 0; transform: translateY(13%) scaleY(0.78); }
      18% { opacity: 0.95; transform: translateY(2%) scaleY(1.04); }
      47% { opacity: 0.42; transform: translateY(-5%) scaleY(1.12); }
      100% { opacity: 0; transform: translateY(-15%) scaleY(0.9); }
    }

    @media (prefers-reduced-motion: reduce) {
      .machine.slot-impact .board-blue-shell,
      .machine.slot-impact .board-inner-frame,
      .machine.slot-impact .score-card,
      .machine.slot-impact .roll,
      .machine.slot-impact .multiplier,
      .machine.bumper-impact .board-blue-shell::before,
      .machine.bumper-impact .board-blue-shell::after {
        animation: none;
      }
    }

    button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.9);
      outline-offset: 3px;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 166px;
      transform: translateX(-50%);
      min-width: 158px;
      padding: 10px 15px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(234, 241, 251, 0.94));

  }

  function colliderRadius(collider) {
    if (collider.kind === 'circle') return collider.r;
    return Math.hypot(collider.w, collider.h) / 2;
  }

  function gridKey(cx, cy) { return String(cx) + "," + String(cy); }

  function addToGrid(collider) {
    const r = colliderRadius(collider) + state.level.board.ballRadius + 6;
    const minX = Math.floor((collider.x - r) / CONFIG.gridSize);
    const maxX = Math.floor((collider.x + r) / CONFIG.gridSize);
    const minY = Math.floor((collider.y - r) / CONFIG.gridSize);
    const maxY = Math.floor((collider.y + r) / CONFIG.gridSize);
    for (let y = minY; y <= maxY; y += 1) {
      for (let x = minX; x <= maxX; x += 1) {
        const key = gridKey(x, y);
        if (!state.grid.has(key)) state.grid.set(key, []);
        state.grid.get(key).push(collider);
      }
    }
  }

  function makeCollider(obj) {
    const restitution = obj.type === 'bumper'
      ? 1.35
      : obj.type === 'peg'
        ? 0.72
        : 0.64;
    if (obj.type === 'peg' || obj.type === 'bumper') {
      return { kind: 'circle', obj, x: obj.x, y: obj.y, r: obj.r, restitution };
    }
    if (obj.type === 'wall') {
      return { kind: 'box', obj, x: obj.x, y: obj.y, w: obj.w, h: obj.h, angle: degToRad(obj.angle || 0), restitution: 0.62 };
    }
    return null;
  }

  function makeSlotSensor(obj) {
    return { obj, x: obj.x, y: obj.y, w: obj.w, h: obj.h, angle: degToRad(obj.angle || 0) };
  }

  function buildCollisionWorld() {
    state.colliders = [];
    state.slotSensors = state.objectGroups.slots.map(makeSlotSensor);
    state.grid = new Map();
    [...state.objectGroups.pegs, ...state.objectGroups.bumpers, ...state.objectGroups.walls].forEach((obj) => {
      const collider = makeCollider(obj);
      if (!collider) return;
      state.colliders.push(collider);
      addToGrid(collider);
    });
  }

  function queryColliders(ball) {
    const seen = new Set();
    const result = [];
    const radius = ball.r + 110;
    const minX = Math.floor((ball.x - radius) / CONFIG.gridSize);
    const maxX = Math.floor((ball.x + radius) / CONFIG.gridSize);
    const minY = Math.floor((ball.y - radius) / CONFIG.gridSize);
    const maxY = Math.floor((ball.y + radius) / CONFIG.gridSize);
    for (let y = minY; y <= maxY; y += 1) {
      for (let x = minX; x <= maxX; x += 1) {
        const list = state.grid.get(gridKey(x, y));
        if (!list) continue;
        list.forEach((collider) => {
          if (seen.has(collider)) return;
          seen.add(collider);
          result.push(collider);
        });
      }
    }
    return result;
  }

  function reflectVelocity(ball, nx, ny, restitution) {
    const vn = ball.vx * nx + ball.vy * ny;
    if (vn >= 0) return;
    const impulse = -(1 + restitution) * vn;
    ball.vx += impulse * nx;
    ball.vy += impulse * ny;
  }

  function resolveCircle(ball, collider) {
    const dx = ball.x - collider.x;
    const dy = ball.y - collider.y;
    const dist = length(dx, dy);
    const minDist = ball.r + collider.r;
    if (dist >= minDist) return false;
    const nx = dx / dist;
    const ny = dy / dist;
    const overlap = minDist - dist;
    ball.x += nx * overlap;
    ball.y += ny * overlap;
    reflectVelocity(ball, nx, ny, collider.restitution);

    if (collider.obj.type === 'bumper') {
      const boost = 260;
      ball.vx += nx * boost;
      ball.vy += ny * boost;
      recordBumperHit(collider.obj);
    }
    return true;
  }

  function resolveBox(ball, collider) {
    const c = Math.cos(-collider.angle);
    const s = Math.sin(-collider.angle);
    const dx = ball.x - collider.x;
    const dy = ball.y - collider.y;
    const lx = dx * c - dy * s;
    const ly = dx * s + dy * c;
    const hw = collider.w / 2;
    const hh = collider.h / 2;
    const closestX = clamp(lx, -hw, hw);
    const closestY = clamp(ly, -hh, hh);
    let nxLocal = lx - closestX;
    let nyLocal = ly - closestY;
    let distSq = nxLocal * nxLocal + nyLocal * nyLocal;

    if (distSq > ball.r * ball.r) return false;

    if (distSq < 0.0001) {
      const edgeX = hw - Math.abs(lx);
      const edgeY = hh - Math.abs(ly);
      if (edgeX < edgeY) {
        nxLocal = Math.sign(lx) || 1;
        nyLocal = 0;
      } else {
        nxLocal = 0;
        nyLocal = Math.sign(ly) || -1;
      }
      distSq = 1;
    }

    const dist = Math.sqrt(distSq);
    const localNx = nxLocal / dist;
    const localNy = nyLocal / dist;
    const cos = Math.cos(collider.angle);
    const sin = Math.sin(collider.angle);
    const nx = localNx * cos - localNy * sin;
    const ny = localNx * sin + localNy * cos;
    const overlap = ball.r - dist;
    ball.x += nx * overlap;
    ball.y += ny * overlap;
    reflectVelocity(ball, nx, ny, collider.restitution);
    return true;
  }

  function insideBoxSensor(ball, sensor) {
    const c = Math.cos(-sensor.angle);
    const s = Math.sin(-sensor.angle);
    const dx = ball.x - sensor.x;
    const dy = ball.y - sensor.y;
    const lx = dx * c - dy * s;
    const ly = dx * s + dy * c;
    return Math.abs(lx) <= sensor.w / 2 && Math.abs(ly) <= sensor.h / 2;
  }

  function resolveBoard(ball) {
    const board = state.level.board;
    const left = ball.r;
    const right = board.width - ball.r;
    const top = ball.r;
    const bottom = board.height + ball.r * 2;
    const bounce = 0.72;
    if (ball.x < left) { ball.x = left; if (ball.vx < 0) ball.vx = -ball.vx * bounce; }
    if (ball.x > right) { ball.x = right; if (ball.vx > 0) ball.vx = -ball.vx * bounce; }
    if (ball.y < top) { ball.y = top; if (ball.vy < 0) ball.vy = -ball.vy * bounce; }
    if (ball.y > bottom) ball.dead = true;
  }

  function stepBall(ball, dt) {
    const gravity = state.level.board.gravity * CONFIG.gravityScale;
    ball.vy += gravity * dt;
    ball.vx *= 0.999;
    ball.vy *= 0.999;
    const speed = Math.hypot(ball.vx, ball.vy);
    if (speed > CONFIG.maxBallSpeed) {
      const scale = CONFIG.maxBallSpeed / speed;
      ball.vx *= scale;
      ball.vy *= scale;
    }
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    const nearby = queryColliders(ball);
    for (let pass = 0; pass < 2; pass += 1) {
      nearby.forEach((collider) => {
        if (collider.kind === 'circle') resolveCircle(ball, collider);
        else resolveBox(ball, collider);
      });
    }

    resolveBoard(ball);

    for (const sensor of state.slotSensors) {
      if (insideBoxSensor(ball, sensor)) {
        scoreBall(ball, sensor.obj);
        break;
      }
    }
  }

  function slotPoints(value) {
    const match = String(value).match(/\d+/);
    return match ? Number(match[0]) : 0;
  }

  function formatPoints(value) {
    return Math.max(0, Math.floor(value)).toLocaleString('es-CO');
  }

  function currentCost() { return state.selectedCount * CONFIG.ballCost; }

  function updateHud() {
    pointsEl.textContent = formatPoints(state.points);
    rollCostEl.textContent = String(currentCost()) + " pts";
    rollButton.disabled = state.points < currentCost();
    document.querySelectorAll('.multiplier').forEach((button) => {
      const count = Number(button.dataset.count);
      button.classList.toggle('active', count === state.selectedCount);
    });
  }

  let toastTimer = null;
  function showToast(message) {
    toastEl.textContent = message;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1400);
  }

  function recordSlotHit(slot) {
    state.slotHits.set(slot.id, now());
    playSfx('slot');
    triggerClass('slot-impact', 520);
  }

  function recordBumperHit(obj) {
    const last = state.bumperHits.get(obj.id) || 0;
    const t = now();
    state.bumperHits.set(obj.id, t);
    if (t - last > 55) playSfx('bumper', 0.82);
    triggerClass('bumper-impact', 700);
  }

  function triggerClass(className, duration) {
    if (!machineEl) return;
    machineEl.classList.remove(className);
    void machineEl.offsetWidth;
    machineEl.classList.add(className);
    const key = className.startsWith('slot') ? 'slot' : 'bumper';
    clearTimeout(state.timers[key]);
    state.timers[key] = setTimeout(() => machineEl.classList.remove(className), duration);
  }

  function scoreBall(ball, slot) {
    if (ball.dead) return;
    ball.dead = true;
    state.points += slotPoints(slot.value);
    recordSlotHit(slot);
    updateHud();
  }

  function spawnBall(x = state.level.spawn.x) {
    playSfx('newball', 0.88);
    state.balls.push({
      id: state.nextBallId++,
      x,
      y: state.level.spawn.y,
      vx: (Math.random() - 0.5) * 90,
      vy: 0,
      r: state.level.board.ballRadius,
      angle: 0,
      spin: (Math.random() - 0.5) * 6,
      dead: false
    });
  }

  function setSelectedCount(count) {
    state.selectedCount = count;
    updateHud();
  }

  function rollSelected() {
    playSfx('button', 0.9);
    const cost = currentCost();
    if (state.points < cost) {
      showToast('Puntos insuficientes');
      return;
    }
    state.points -= cost;
    updateHud();
    const count = state.selectedCount;
    for (let i = 0; i < count; i += 1) {
      setTimeout(() => {
        const spread = Math.min(20, 5 + count * 1.2);
        spawnBall(state.level.spawn.x + (Math.random() - 0.5) * spread);
      }, i * 90);
    }
  }

  function slotRewardTheme(value) {
    const text = String(value);
    if (text.startsWith('10')) return { label: '+10', core: '196,112,58', edge: '255,196,128', text: '#d47b3f', shadow: 'rgba(95,45,18,0.38)' };
    if (text.startsWith('20')) return { label: '+20', core: '210,219,226', edge: '255,255,255', text: '#dce7ef', shadow: 'rgba(64,84,96,0.36)' };
    return { label: '+50', core: '245,190,72', edge: '255,239,166', text: '#ffd166', shadow: 'rgba(105,69,10,0.4)' };
  }

  function slotHitProgress(obj) {
    const hitAt = state.slotHits.get(obj.id);
    if (hitAt == null) return null;
    const age = (now() - hitAt) / 900;
    if (age >= 1) { state.slotHits.delete(obj.id); return null; }
    return { age, pulse: 1 - age };
  }

  function drawSlot(obj) {
    const hit = slotHitProgress(obj);
    const age = hit?.age ?? 0;
    const pulse = hit?.pulse ?? 0;
    const jitter = pulse ? Math.sin(age * Math.PI * 18) * 2.4 * pulse : 0;
    const lift = pulse ? -Math.sin(age * Math.PI) * 3 * pulse : 0;
    const img = imageForObject(obj);
    drawImageCentered(ctx, img, obj.x + jitter, obj.y + lift, obj.w * (1 + 0.03 * pulse), obj.h * (1 + 0.04 * pulse), obj.angle || 0);
  }

  function drawBumper(obj) {
    const hitAt = state.bumperHits.get(obj.id);
    const age = hitAt ? (now() - hitAt) / 350 : Infinity;
    const pulse = age < 1 ? (age < 0.1 ? age / 0.1 : Math.pow(1 - (age - 0.1) / 0.9, 3)) : 0;
    if (hitAt && age >= 1) state.bumperHits.delete(obj.id);
    const scale = 1 + 0.34 * pulse;
    drawImageCentered(ctx, state.sprites.bumper, obj.x, obj.y, obj.r * 2 * scale, obj.r * 2 * scale);
  }

  function drawSlotRewardText(obj) {
    const hit = slotHitProgress(obj);
    if (!hit) return;
    const { age } = hit;
    const theme = slotRewardTheme(obj.value);
    const alpha = Math.max(0, 1 - age);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '900 30px Gotham, Montserrat, Avenir Next, ui-sans-serif, system-ui, sans-serif';
    ctx.lineWidth = 6;
    ctx.strokeStyle = theme.shadow;
    ctx.fillStyle = theme.text;
    ctx.strokeText(theme.label, obj.x, obj.y - 30 - age * 94);
    ctx.fillText(theme.label, obj.x, obj.y - 30 - age * 94);
    ctx.restore();
  }

  function makeStaticLayer() {
    const { width, height, cornerRadius } = state.level.board;
    const layer = document.createElement('canvas');
    layer.width = width;
    layer.height = height;
    const c = layer.getContext('2d');
    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = isTouchDevice ? 'medium' : 'high';
    drawRoundRect(c, 0, 0, width, height, cornerRadius || 0);
    c.clip();
    c.drawImage(state.images.board, 0, 0, width, height);
    state.objectGroups.walls.forEach((obj) => {
      const img = imageForObject(obj);
      if (obj.id === 'piso') drawImageCentered(c, img, obj.x, obj.y, obj.w, obj.h, obj.angle || 0);
      else drawImageCentered(c, img, obj.x, obj.y, Math.min(obj.w, obj.h), Math.max(obj.w, obj.h), 0);
    });
    state.objectGroups.pegs.forEach((obj) => drawImageCentered(c, state.sprites.peg, obj.x, obj.y, obj.r * 2, obj.r * 2));
    state.staticLayer = layer;
  }

  function resizeCanvasIfNeeded() {
    const { width, height } = state.level.board;
    const scale = canvas.clientWidth / width;
    const nextWidth = Math.max(1, Math.round(width * scale * renderDpr));
    const nextHeight = Math.max(1, Math.round(height * scale * renderDpr));
    if (canvas.width !== nextWidth || canvas.height !== nextHeight) {
      canvas.width = nextWidth;
      canvas.height = nextHeight;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = isTouchDevice ? 'medium' : 'high';
    }
    state.renderScale = scale;
    return scale;
  }

  function draw() {
    const { width, height, cornerRadius } = state.level.board;
    const scale = resizeCanvasIfNeeded();
    ctx.setTransform(scale * renderDpr, 0, 0, scale * renderDpr, 0, 0);
    ctx.clearRect(0, 0, width, height);
    ctx.save();
    drawRoundRect(ctx, 0, 0, width, height, cornerRadius || 0);
    ctx.clip();
    ctx.drawImage(state.staticLayer, 0, 0, width, height);
    state.objectGroups.slots.forEach(drawSlot);
    state.objectGroups.bumpers.forEach(drawBumper);
    state.balls.forEach((ball) => {
      ball.angle += ball.spin * (1 / 60);
      drawImageCentered(ctx, state.sprites.ball, ball.x, ball.y, ball.r * 2, ball.r * 2, ball.angle * 180 / Math.PI);
    });
    state.objectGroups.slots.forEach(drawSlotRewardText);
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 2;
    drawRoundRect(ctx, 1, 1, width - 2, height - 2, Math.max(0, (cornerRadius || 0) - 1));
    ctx.stroke();
    ctx.restore();
  }

  function updatePhysics(dt) {
    state.balls.forEach((ball) => stepBall(ball, dt));
    state.balls = state.balls.filter((ball) => !ball.dead);
  }

  function tick(timestamp = performance.now()) {
    const previous = state.lastFrameAt || timestamp;
    const elapsed = clamp(timestamp - previous, 0, 80);
    state.lastFrameAt = timestamp;
    state.accumulator += elapsed * CONFIG.timeScale;
    let steps = 0;
    while (state.accumulator >= CONFIG.physicsStep && steps < CONFIG.maxSteps) {
      updatePhysics(CONFIG.physicsStep / 1000);
      state.accumulator -= CONFIG.physicsStep;
      steps += 1;
    }
    if (steps === CONFIG.maxSteps) state.accumulator = 0;
    draw();
    state.raf = requestAnimationFrame(tick);
  }

  function reset() {
    cancelAnimationFrame(state.raf);
    state.balls = [];
    state.nextBallId = 1;
    state.bumperHits = new Map();
    state.slotHits = new Map();
    state.lastFrameAt = null;
    state.accumulator = 0;
    updateHud();
    tick();
  }

  async function init() {
    makeFallbackSfx();
    const loadedImages = await Promise.all(Object.entries(assetPaths).map(async ([key, src]) => [key, await loadImage(src)]));
    state.images = Object.fromEntries(loadedImages);
    prepareGroups();
    makeSprites();
    buildCollisionWorld();
    makeStaticLayer();
    reset();
  }

  rollButton.addEventListener('click', rollSelected);
  document.querySelectorAll('.multiplier').forEach((button) => {
    button.addEventListener('click', () => {
      playSfx('button', 0.78);
      setSelectedCount(Number(button.dataset.count));
    });
  });

  init().catch((error) => {
    console.error(error);
    showToast(error.message || 'No se pudo cargar');
  });
})();

</script>
</body>
</html>
