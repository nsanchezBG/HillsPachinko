<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hill's Pachinko</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <style>
    :root {
      --brand-font: "Gotham", "Gotham SSm", "Gotham Rounded", "Montserrat", "Avenir Next", "Proxima Nova", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --blue: #2d6eb8;
      --blue-mid: #3478c6;
      --blue-dark: #1d5599;
      --blue-deep: #0b3265;
      --chrome-a: #ffffff;
      --chrome-b: #d8e0e8;
      --chrome-c: #8e9aa8;
      --ink: #07111f;
      --muted: #41526c;
      --paper: #f8fbff;
      --paper-low: #e8eef8;
      --shadow: 0 26px 64px rgba(4, 30, 66, 0.42);
      --press-time: 110ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: start center;
      min-height: 100dvh;
      padding: 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0) 32%),
        linear-gradient(145deg, #3b7fc7 0%, var(--blue) 42%, #205a9e 72%, #174986 100%);
      color: var(--ink);
      font-family: var(--brand-font);
      overflow: auto;
      text-rendering: geometricPrecision;
    }

    .machine {
      position: relative;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: clamp(8px, 1.55vh, 13px);
      width: calc(100vw - 20px);
      max-width: 455px;
      padding: clamp(10px, 1.6vh, 14px) clamp(10px, 2.4vw, 14px) clamp(10px, 1.8vh, 14px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: clamp(20px, 5vw, 28px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0) 20%),
        linear-gradient(180deg, var(--blue-mid) 0%, var(--blue) 44%, var(--blue-dark) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.35),
        inset 0 -10px 22px rgba(9, 48, 98, 0.24),
        0 2px 0 rgba(255, 255, 255, 0.12),
        var(--shadow);
    }

    .board-frame {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 0;
      margin-top: clamp(18px, 4.6vw, 26px);
      padding: clamp(7px, 1.8vw, 10px);
      border-radius: clamp(38px, 9vw, 52px);
      background:
        linear-gradient(130deg, #ffffff 0%, #cad4df 13%, #6f7f91 25%, #f7fbff 39%, #a7b2bf 54%, #ffffff 69%, #788696 83%, #d7e1eb 100%);
      box-shadow:
        inset 0 3px 0 rgba(255, 255, 255, 0.95),
        inset 0 -4px 0 rgba(47, 60, 76, 0.54),
        inset 3px 0 4px rgba(255, 255, 255, 0.62),
        inset -4px 0 7px rgba(49, 64, 82, 0.36),
        0 2px 0 rgba(255, 255, 255, 0.28),
        0 7px 0 rgba(3, 31, 70, 0.34),
        0 14px 18px rgba(0, 18, 47, 0.48);
    }

    .board-blue-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      overflow: hidden;
      padding: clamp(3px, 0.8vw, 5px) clamp(15px, 4vw, 22px) clamp(5px, 1.4vw, 8px);
      border-radius: clamp(32px, 8vw, 45px);
      background:
        linear-gradient(90deg, #022353 0%, #0859b5 7%, #0a73d8 12%, #064086 18%, #064086 82%, #0a73d8 88%, #0859b5 93%, #022353 100%);
      box-shadow:
        inset 0 2px 0 rgba(112, 184, 255, 0.46),
        inset 0 -5px 10px rgba(0, 16, 48, 0.64),
        inset 8px 0 14px rgba(0, 16, 48, 0.58),
        inset -8px 0 14px rgba(0, 16, 48, 0.58),
        0 1px 0 rgba(255, 255, 255, 0.38);
    }

    .board-blue-shell::before,
    .board-blue-shell::after {
      content: "";
      position: absolute;
      z-index: 1;
      top: 8%;
      bottom: 9%;
      width: clamp(20px, 5.2vw, 30px);
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      background:
        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.98) 0%, rgba(255, 255, 255, 0.58) 24%, rgba(116, 194, 255, 0.2) 50%, rgba(116, 194, 255, 0) 74%);
      filter: blur(1.6px);
    }

    .board-blue-shell::before {
      left: clamp(4px, 1.3vw, 7px);
    }

    .board-blue-shell::after {
      right: clamp(4px, 1.3vw, 7px);
    }

    .board-inner-frame {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: clamp(6px, 1.6vw, 9px);
      border-radius: clamp(29px, 7.4vw, 40px);
      background:
        linear-gradient(145deg, #ffffff 0%, #dce5ef 15%, #8a99aa 28%, #ffffff 43%, #c5cfda 59%, #768799 74%, #f7fbff 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.96),
        inset 0 -3px 0 rgba(51, 66, 84, 0.5),
        inset 3px 0 5px rgba(255, 255, 255, 0.68),
        inset -4px 0 7px rgba(50, 65, 84, 0.28),
        0 0 0 1px rgba(255, 255, 255, 0.42),
        0 4px 8px rgba(0, 24, 62, 0.28);
    }

    .board-logo-plaque {
      position: absolute;
      z-index: 6;
      top: clamp(-48px, -10.6vw, -38px);
      left: 50%;
      display: grid;
      place-items: center;
      width: clamp(101px, 26.1vw, 122px);
      height: clamp(82px, 21vw, 100px);
      padding: 10px 14px 15px;
      transform: translateX(-50%);
      border: 2px solid transparent;
      border-radius: 0 0 17px 17px;
      background:
        linear-gradient(180deg, #ffffff 0%, #fbfdff 46%, #e5edf5 75%, #cbd7e4 100%) padding-box,
        linear-gradient(135deg, #ffffff 0%, #bac6d3 23%, #f7fbff 48%, #8b99a8 75%, #ffffff 100%) border-box;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.98),
        inset 0 -10px 18px rgba(43, 67, 94, 0.18),
        inset 5px 0 10px rgba(255, 255, 255, 0.42),
        inset -5px 0 10px rgba(56, 72, 90, 0.12),
        0 5px 0 rgba(28, 55, 91, 0.2),
        0 13px 18px rgba(4, 29, 69, 0.26);
    }

    .board-logo-plaque img {
      display: block;
      width: 92%;
      height: 92%;
      object-fit: contain;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 720 / 960;
      border: 0;
      border-radius: clamp(23px, 6.4vw, 34px);
      touch-action: none;
      background: #fbf8f2;
      box-shadow:
        inset 0 0 0 1px rgba(34, 64, 92, 0.24),
        0 1px 0 rgba(255, 255, 255, 0.96),
        0 10px 20px rgba(5, 30, 66, 0.18);
    }

    .hud {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: clamp(9px, 2.6vw, 13px);
      min-height: clamp(106px, 15.5vh, 124px);
    }

    button {
      border: 0;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.35);
      opacity: 0.62;
    }

    .score-card {
      justify-self: start;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      width: 100%;
      min-width: 0;
      height: clamp(94px, 13.7vh, 108px);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: clamp(18px, 5vw, 24px);
      background:
        linear-gradient(180deg, #ffffff 0%, var(--paper) 45%, var(--paper-low) 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.95),
        inset 0 -8px 15px rgba(41, 74, 115, 0.12),
        0 7px 0 rgba(10, 49, 101, 0.42),
        0 18px 28px rgba(8, 35, 75, 0.22);
    }

    .score-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 45%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .score-card > div {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    .score-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: #074c9f;
      font-size: clamp(17px, 4.7vw, 22px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .score-card strong {
      display: block;
      color: #074c9f;
      font-size: clamp(39px, 10vw, 52px);
      line-height: 0.82;
      font-weight: 950;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .logo {
      align-self: start;
      justify-self: end;
      width: clamp(58px, 15vw, 70px);
      height: clamp(58px, 15vw, 70px);
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 999px;
      background:
        linear-gradient(180deg, #ffffff 0%, #f6f8fb 54%, #dbe5ef 100%);
      object-fit: contain;
      margin-top: 2px;
      image-rendering: auto;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.96),
        inset 0 -8px 13px rgba(41, 70, 106, 0.12),
        0 6px 0 rgba(7, 48, 103, 0.44),
        0 14px 24px rgba(5, 31, 71, 0.24);
      filter:
        drop-shadow(0 1px 0 rgba(255, 255, 255, 0.22));
    }

    .roll {
      justify-self: end;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      width: min(164px, 37vw);
      min-width: 128px;
      height: clamp(84px, 12.4vh, 98px);
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: clamp(28px, 7.4vw, 42px);
      background:
        radial-gradient(ellipse at 50% 17%, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.08) 33%, rgba(255, 255, 255, 0) 49%),
        linear-gradient(180deg, #ff5e66 0%, #ed1c35 48%, #b90d27 100%);
      box-shadow:
        inset 0 3px 0 rgba(255, 255, 255, 0.42),
        inset 0 0 0 2px rgba(255, 255, 255, 0.18),
        inset 0 -12px 16px rgba(80, 0, 18, 0.28),
        inset 5px 0 10px rgba(255, 255, 255, 0.12),
        inset -5px 0 10px rgba(63, 0, 18, 0.22),
        0 3px 0 rgba(255, 255, 255, 0.28),
        0 8px 0 rgba(108, 7, 29, 0.95),
        0 12px 12px rgba(0, 16, 44, 0.52);
      transition: transform var(--press-time) ease, box-shadow var(--press-time) ease, filter var(--press-time) ease;
    }

    .roll::before {
      content: "";
      position: absolute;
      inset: 8% 8% 50%;
      border-radius: 999px 999px 40% 40%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.08) 70%, rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .roll:active:not(:disabled) {
      transform: translateY(6px) scale(0.985);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.22),
        inset 0 9px 18px rgba(65, 0, 16, 0.26),
        0 2px 0 rgba(255, 255, 255, 0.3),
        0 3px 0 rgba(103, 8, 30, 0.86),
        0 7px 9px rgba(0, 16, 44, 0.42);
    }

    .roll-text {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    .roll-text strong {
      font-size: clamp(27px, 7.8vw, 36px);
      line-height: 0.9;
      font-weight: 950;
      letter-spacing: 0;
      color: #ffffff;
      text-shadow: 0 2px 0 rgba(77, 0, 18, 0.32);
    }

    .roll-cost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: clamp(14px, 4vw, 19px);
      line-height: 1;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.94);
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .paw-icon {
      display: inline-block;
      width: 0.5em;
      height: 0.5em;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .paw-blue {
      filter: invert(23%) sepia(96%) saturate(1661%) hue-rotate(194deg) brightness(88%) contrast(101%);
      opacity: 0.5;
    }

    .paw-white {
      filter: invert(1) drop-shadow(0 1px 0 rgba(98, 0, 22, 0.35));
      opacity: 0.78;
    }

    .multipliers {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: clamp(6px, 1.8vw, 9px);
      width: 100%;
    }

    .multiplier {
      min-width: 0;
      height: clamp(48px, 7.4vh, 60px);
      border: 4px solid transparent;
      border-radius: clamp(9px, 2.5vw, 12px);
      background:
        linear-gradient(90deg, rgba(46, 66, 88, 0.38), rgba(255, 255, 255, 0.78) 11%, rgba(255, 255, 255, 0) 24%, rgba(0, 0, 0, 0.1) 100%) padding-box,
        linear-gradient(180deg, var(--m-top) 0%, var(--m-mid) 54%, var(--m-bottom) 100%) padding-box,
        linear-gradient(135deg, #ffffff 0%, #c9d2dc 16%, #6e7a88 31%, #ffffff 48%, #b7c0ca 62%, #5d6976 79%, #eef4fb 100%) border-box;
      color: var(--m-ink, #080b10);
      font-size: clamp(24px, 6.8vw, 34px);
      line-height: 1;
      font-weight: 650;
      letter-spacing: 0;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.56),
        inset 0 -6px 10px rgba(0, 0, 0, 0.09),
        inset 4px 0 8px rgba(255, 255, 255, 0.16),
        inset -4px 0 8px rgba(0, 0, 0, 0.12),
        0 4px 0 rgba(255, 255, 255, 0.36),
        0 7px 0 var(--m-edge),
        0 10px 10px rgba(0, 16, 44, 0.42);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.36);
      transition: transform var(--press-time) ease, box-shadow var(--press-time) ease, filter var(--press-time) ease;
    }

    .multiplier[data-count="1"] {
      --m-top: #ffffff;
      --m-mid: #eef3fb;
      --m-bottom: #d7e0ed;
      --m-edge: #aeb9c8;
      --m-ink: #074c9f;
    }

    .multiplier[data-count="2"] {
      --m-top: #ffffff;
      --m-mid: #cfd8e2;
      --m-bottom: #9ca9b6;
      --m-edge: #637080;
      --m-ink: #074c9f;
    }

    .multiplier[data-count="3"] {
      --m-top: #ffe889;
      --m-mid: #f6c532;
      --m-bottom: #d9a21b;
      --m-edge: #a77815;
      --m-ink: #074c9f;
    }

    .multiplier[data-count="5"] {
      --m-top: #ffb15f;
      --m-mid: #f5822e;
      --m-bottom: #d9651e;
      --m-edge: #a44716;
      --m-ink: #ffffff;
    }

    .multiplier[data-count="10"] {
      --m-top: #ff8b51;
      --m-mid: #f05d25;
      --m-bottom: #cb4218;
      --m-edge: #963011;
      --m-ink: #ffffff;
    }

    .multiplier.active {
      outline: 0;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.62),
        inset 0 -6px 10px rgba(0, 0, 0, 0.1),
        inset 4px 0 8px rgba(255, 255, 255, 0.16),
        inset -4px 0 8px rgba(0, 0, 0, 0.12),
        0 0 0 2px rgba(255, 255, 255, 0.92),
        0 0 0 4px rgba(8, 44, 92, 0.26),
        0 7px 0 var(--m-edge),
        0 11px 11px rgba(0, 16, 44, 0.46);
      transform: translateY(-2px);
      filter: saturate(1.06);
    }

    .multiplier:active {
      transform: translateY(5px);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.45),
        inset 0 5px 12px rgba(0, 0, 0, 0.15),
        0 1px 0 var(--m-edge),
        0 5px 7px rgba(0, 16, 44, 0.34);
    }

    .multiplier.active:active {
      transform: translateY(4px);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.48),
        inset 0 5px 12px rgba(0, 0, 0, 0.15),
        0 0 0 3px rgba(255, 255, 255, 0.82),
        0 1px 0 var(--m-edge),
        0 5px 7px rgba(0, 16, 44, 0.34);
    }

    .machine.slot-impact .board-blue-shell {
      animation: board-impact-drift 360ms cubic-bezier(0.2, 0.8, 0.28, 1) 8ms both;
    }

    .machine.slot-impact .board-inner-frame {
      animation: board-impact-noise 430ms cubic-bezier(0.2, 0.8, 0.28, 1) 36ms both;
    }

    .machine.slot-impact .score-card {
      animation: ui-impact-left 350ms cubic-bezier(0.18, 0.88, 0.26, 1) 18ms both;
    }

    .machine.slot-impact .roll {
      animation: ui-impact-right 410ms cubic-bezier(0.18, 0.88, 0.26, 1) 62ms both;
    }

    .machine.slot-impact .multiplier:nth-child(1) {
      animation: ui-impact-chip-a 320ms cubic-bezier(0.2, 0.84, 0.28, 1) 28ms both;
    }

    .machine.slot-impact .multiplier:nth-child(2) {
      animation: ui-impact-chip-b 380ms cubic-bezier(0.2, 0.84, 0.28, 1) 48ms both;
    }

    .machine.slot-impact .multiplier:nth-child(3) {
      animation: ui-impact-chip-a 350ms cubic-bezier(0.2, 0.84, 0.28, 1) 72ms both;
    }

    .machine.slot-impact .multiplier:nth-child(4) {
      animation: ui-impact-chip-b 420ms cubic-bezier(0.2, 0.84, 0.28, 1) 38ms both;
    }

    .machine.slot-impact .multiplier:nth-child(5) {
      animation: ui-impact-chip-a 360ms cubic-bezier(0.2, 0.84, 0.28, 1) 92ms both;
    }

    .machine.bumper-impact .board-blue-shell::before {
      animation: side-rail-glint 560ms ease-out both;
    }

    .machine.bumper-impact .board-blue-shell::after {
      animation: side-rail-glint 620ms ease-out 36ms both;
    }

    @keyframes board-impact-drift {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); filter: brightness(1); }
      18% { transform: translate3d(-1.4px, 1px, 0) rotate(-0.14deg); filter: brightness(1.035); }
      37% { transform: translate3d(1.7px, -0.8px, 0) rotate(0.16deg); }
      61% { transform: translate3d(-0.7px, 0.5px, 0) rotate(-0.08deg); }
      100% { transform: translate3d(0, 0, 0) rotate(0deg); filter: brightness(1); }
    }

    @keyframes board-impact-noise {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); }
      16% { transform: translate3d(1px, -0.8px, 0) rotate(0.09deg); }
      31% { transform: translate3d(-1.3px, 0.6px, 0) rotate(-0.12deg); }
      57% { transform: translate3d(0.8px, 0.3px, 0) rotate(0.05deg); }
      100% { transform: translate3d(0, 0, 0) rotate(0deg); }
    }

    @keyframes ui-impact-left {
      0% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1); }
      23% { transform: translate3d(1.2px, -0.8px, 0) scale(1.006); filter: brightness(1.045); }
      49% { transform: translate3d(-0.8px, 1px, 0) scale(0.998); }
      100% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1); }
    }

    @keyframes ui-impact-right {
      0% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1); }
      19% { transform: translate3d(-1px, 0.8px, 0) scale(1.005); filter: brightness(1.04); }
      44% { transform: translate3d(1.3px, -0.6px, 0) scale(0.999); }
      72% { transform: translate3d(-0.4px, 0.2px, 0) scale(1.002); }
      100% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1); }
    }

    @keyframes ui-impact-chip-a {
      0% { transform: translate3d(0, 0, 0); }
      35% { transform: translate3d(0.7px, -1px, 0); }
      68% { transform: translate3d(-0.7px, 0.6px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    @keyframes ui-impact-chip-b {
      0% { transform: translate3d(0, 0, 0); }
      28% { transform: translate3d(-0.8px, 0.7px, 0); }
      59% { transform: translate3d(0.6px, -0.8px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    @keyframes side-rail-glint {
      0% { opacity: 0; transform: translateY(13%) scaleY(0.78); }
      18% { opacity: 0.95; transform: translateY(2%) scaleY(1.04); }
      47% { opacity: 0.42; transform: translateY(-5%) scaleY(1.12); }
      100% { opacity: 0; transform: translateY(-15%) scaleY(0.9); }
    }

    @media (prefers-reduced-motion: reduce) {
      .machine.slot-impact .board-blue-shell,
      .machine.slot-impact .board-inner-frame,
      .machine.slot-impact .score-card,
      .machine.slot-impact .roll,
      .machine.slot-impact .multiplier,
      .machine.bumper-impact .board-blue-shell::before,
      .machine.bumper-impact .board-blue-shell::after {
        animation: none;
      }
    }

    button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.9);
      outline-offset: 3px;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 166px;
      transform: translateX(-50%);
      min-width: 158px;
      padding: 10px 15px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 999px;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function playSfx(name, volume = 1) {
      const sound = sfx[name];
      if (!sound) return;
      const audio = sound.pool[sound.index];
      sound.index = (sound.index + 1) % sound.pool.length;
      try {
        audio.pause();
        audio.currentTime = 0;
        audio.volume = clamp(volume * (name === "button" ? 0.42 : name === "bumper" ? 0.62 : 0.72), 0, 1);
        audio.play().catch(() => {});
      } catch (_) {}
    }

    function numberOr(value, fallback) {
      const next = Number(value);
      return Number.isFinite(next) ? next : fallback;
    }

    function degToRad(deg) {
      return (Number(deg) || 0) * Math.PI / 180;
    }

    function drawRoundRect(context, x, y, w, h, r) {
      const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
      context.beginPath();
      context.moveTo(x + radius, y);
      context.arcTo(x + w, y, x + w, y + h, radius);
      context.arcTo(x + w, y + h, x, y + h, radius);
      context.arcTo(x, y + h, x, y, radius);
      context.arcTo(x, y, x + w, y, radius);
      context.closePath();
    }

    function worldToLocal(point, obj) {
      const a = -degToRad(obj.angle || 0);
      const c = Math.cos(a);
      const s = Math.sin(a);
      const dx = point.x - obj.x;
      const dy = point.y - obj.y;
      return {
        x: dx * c - dy * s,
        y: dx * s + dy * c
      };
    }

    function rotateVector(obj, vector) {
      const c = Math.cos(degToRad(obj.angle || 0));
      const s = Math.sin(degToRad(obj.angle || 0));
      return {
        x: vector.x * c - vector.y * s,
        y: vector.x * s + vector.y * c
      };
    }

    function bounceNormalFor(ball, obj) {
      if (obj.r) {
        const dx = ball.position.x - obj.x;
        const dy = ball.position.y - obj.y;
        const length = Math.hypot(dx, dy) || 1;
        return { x: dx / length, y: dy / length };
      }

      if (obj.w && obj.h) {
        const local = worldToLocal(ball.position, obj);
        const edgeX = obj.w / 2 - Math.abs(local.x);
        const edgeY = obj.h / 2 - Math.abs(local.y);
        const localNormal = edgeX < edgeY
          ? { x: Math.sign(local.x) || 1, y: 0 }
          : { x: 0, y: Math.sign(local.y) || -1 };
        const normal = rotateVector(obj, localNormal);
        const length = Math.hypot(normal.x, normal.y) || 1;
        return { x: normal.x / length, y: normal.y / length };
      }

      return { x: 0, y: -1 };
    }

    function queueBounceBoost(engine, ball, obj) {
      const bounce = numberOr(obj.restitution, 0.45);
      if (bounce <= 1) return;
      engine.plugin.bounceBoosts = engine.plugin.bounceBoosts || [];
      engine.plugin.bounceBoosts.push({ ball, bounce, normal: bounceNormalFor(ball, obj) });
    }

    function applyQueuedBounceBoosts(engine) {
      const boosts = engine.plugin.bounceBoosts || [];
      if (!boosts.length) return;
      engine.plugin.bounceBoosts = [];
      boosts.forEach(({ ball, bounce, normal }) => {
        if (!ball.parent || ball.isSleeping) return;
        const extra = clamp(Math.sqrt(Math.max(0, bounce - 1)) * 1.8, 0, 28);
        Body.setVelocity(ball, {
          x: ball.velocity.x + normal.x * extra,
          y: ball.velocity.y + normal.y * extra
        });
      });
    }

    function boundaryOptions(level, label, shape) {
      const bounce = numberOr(level.board.borderRestitution, 0.42);
      return {
        isStatic: true,
        restitution: clamp(bounce, 0, 1),
        friction: numberOr(level.board.borderFriction, 0.04),
        label,
        plugin: {
          blueprint: {
            id: label,
            type: "border",
            restitution: bounce,
            ...shape
          }
        }
      };
    }

    function boundarySegment(level, label, x, y, w, h, angle = 0) {
      const body = Bodies.rectangle(x, y, w, h, boundaryOptions(level, label, { x, y, w, h, angle }));
      Body.setAngle(body, degToRad(angle));
      return body;
    }

    function makeBoardBoundaries(level) {
      const { board } = level;
      const w = board.width;
      const h = board.height;
      const t = Math.max(32, board.ballRadius * 4);
      const r = clamp(numberOr(board.cornerRadius, 0), 0, Math.min(w, h) / 2 - 4);
      const bodies = [
        boundarySegment(level, "border-top", w / 2, -t / 2, Math.max(1, w - r * 2), t),
        boundarySegment(level, "border-bottom", w / 2, h + t / 2, Math.max(1, w - r * 2), t),
        boundarySegment(level, "border-left", -t / 2, h / 2, t, Math.max(1, h - r * 2)),
        boundarySegment(level, "border-right", w + t / 2, h / 2, t, Math.max(1, h - r * 2))
      ];

      if (r > 0) {
        const steps = clamp(Math.ceil(r / 10), 6, 18);
        const arcLength = Math.max(18, (Math.PI * r / 2) / steps + t * 0.25);
        [
          { id: "tl", cx: r, cy: r, start: 180 },
          { id: "tr", cx: w - r, cy: r, start: 270 },
          { id: "br", cx: w - r, cy: h - r, start: 0 },
          { id: "bl", cx: r, cy: h - r, start: 90 }
        ].forEach((corner) => {
          for (let i = 0; i < steps; i += 1) {
            const deg = corner.start + (i + 0.5) * (90 / steps);
            const rad = degToRad(deg);
            bodies.push(boundarySegment(
              level,
              `border-${corner.id}-${i}`,
              corner.cx + Math.cos(rad) * r,
              corner.cy + Math.sin(rad) * r,
              arcLength,
              t,
              deg + 90
            ));
          }
        });
      }

      return bodies;
    }

    function makeEngine(level) {
      const engine = Engine.create();
      engine.gravity.y = numberOr(level.board.gravity, 1);
      Composite.add(engine.world, makeBoardBoundaries(level));

      level.objects.forEach((obj) => {
        const bounce = numberOr(obj.restitution, 0.45);
        const base = {
          isStatic: true,
          restitution: clamp(bounce, 0, 1),
          friction: 0.04,
          label: obj.id,
          plugin: { blueprint: obj }
        };
        let body;
        if (obj.type === "peg" || obj.type === "bumper") {
          body = Bodies.circle(obj.x, obj.y, obj.r, base);
        } else if (obj.type === "slot") {
          body = Bodies.rectangle(obj.x, obj.y, obj.w, obj.h, { ...base, isSensor: true });
          Body.setAngle(body, degToRad(obj.angle || 0));
        } else {
          body = Bodies.rectangle(obj.x, obj.y, obj.w, obj.h, base);
          Body.setAngle(body, degToRad(obj.angle || 0));
        }
        Composite.add(engine.world, body);
      });

      Events.on(engine, "collisionStart", (event) => {
        event.pairs.forEach((pair) => {
          const bodies = [pair.bodyA, pair.bodyB];
          const ball = bodies.find((b) => b.label && b.label.startsWith("ball:"));
          const obstacle = bodies.find((b) => {
            const obj = b.plugin?.blueprint;
            return obj && !["slot", "sensor"].includes(obj.type);
          });
          const slot = bodies.find((b) => b.plugin?.blueprint?.type === "slot");
          if (ball && obstacle) {
            const obj = obstacle.plugin.blueprint;
            queueBounceBoost(engine, ball, obj);
            if (obj.type === "bumper") recordBumperHit(obj);
          }
          if (ball && slot) scoreBall(engine, ball, slot.plugin.blueprint);
        });
      });

      Events.on(engine, "afterUpdate", () => applyQueuedBounceBoosts(engine));
      return engine;
    }

    function scoreBall(engine, ball, slot) {
      if (state.scored.has(ball.id)) return;
      state.scored.add(ball.id);
      state.scores[slot.value] = (state.scores[slot.value] || 0) + 1;
      state.points += slotPoints(slot.value);
      recordSlotHit(slot);
      updateHud();
      setTimeout(() => {
        try {
          World.remove(engine.world, ball);
        } catch (_) {}
      }, 0);
    }

    function recordSlotHit(slot) {
      state.slotHits.set(slot.id, performance.now());
      playSfx("slot");
      triggerSlotImpact();
    }

    function triggerSlotImpact() {
      if (!machineEl) return;
      machineEl.classList.remove("slot-impact");
      void machineEl.offsetWidth;
      machineEl.classList.add("slot-impact");
      clearTimeout(slotImpactTimer);
      slotImpactTimer = setTimeout(() => {
        machineEl.classList.remove("slot-impact");
      }, 520);
    }

    function slotPoints(value) {
      const match = String(value).match(/\d+/);
      return match ? Number(match[0]) : 0;
    }

    function formatPoints(value) {
      return Math.max(0, Math.floor(value)).toLocaleString("es-CO");
    }

    function currentCost() {
      return state.selectedCount * state.ballCost;
    }

    function updateHud() {
      pointsEl.textContent = formatPoints(state.points);
      rollCostEl.textContent = `${currentCost()} pts`;
      rollButton.disabled = state.points < currentCost();
      document.querySelectorAll(".multiplier").forEach((button) => {
        const count = Number(button.dataset.count);
        button.classList.toggle("active", count === state.selectedCount);
      });
    }

    let toastTimer = null;
    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1400);
    }

    function setSelectedCount(count) {
      state.selectedCount = count;
      updateHud();
    }

    function rollSelected() {
      playSfx("button", 0.9);
      const cost = currentCost();
      if (state.points < cost) {
        showToast("Puntos insuficientes");
        return;
      }

      state.points -= cost;
      updateHud();

      const count = state.selectedCount;
      for (let i = 0; i < count; i += 1) {
        setTimeout(() => {
          const spread = Math.min(18, 4 + count * 1.2);
          spawnBall(state.level.spawn.x + (Math.random() - 0.5) * spread);
        }, i * 130);
      }
    }

    function recordBumperHit(obj) {
      state.bumperHits.set(obj.id, performance.now());
      playSfx("bumper");
      triggerBumperImpact();
    }

    function triggerBumperImpact() {
      if (!machineEl) return;
      machineEl.classList.remove("bumper-impact");
      void machineEl.offsetWidth;
      machineEl.classList.add("bumper-impact");
      clearTimeout(bumperImpactTimer);
      bumperImpactTimer = setTimeout(() => {
        machineEl.classList.remove("bumper-impact");
      }, 720);
    }

    function updateTrails() {
      const liveBallIds = new Set();
      Composite.allBodies(state.engine.world)
        .filter((body) => body.label?.startsWith("ball:"))
        .forEach((body) => {
          liveBallIds.add(body.id);
          const trail = state.trails.get(body.id) || [];
          trail.push({
            x: body.position.x,
            y: body.position.y,
            life: 1,
            speed: Math.hypot(body.velocity.x, body.velocity.y)
          });
          while (trail.length > 26) trail.shift();
          state.trails.set(body.id, trail);
        });

      state.trails.forEach((trail, id) => {
        trail.forEach((point) => {
          point.life -= liveBallIds.has(id) ? 0.035 : 0.06;
        });
        const remaining = trail.filter((point) => point.life > 0);
        if (remaining.length) state.trails.set(id, remaining);
        else state.trails.delete(id);
      });
      const now = performance.now();
      state.slotHits.forEach((startedAt, id) => {
        if (now - startedAt > SLOT_HIT_DURATION + 40) state.slotHits.delete(id);
      });
    }

    function imageForObject(obj) {
      if (obj.type === "peg") return state.sprites.peg;
      if (obj.type === "bumper") return state.sprites.bumper;
      if (obj.id === "piso") return state.sprites.floor;
      if (obj.type === "wall") return state.sprites.divider;
      if (obj.type === "slot") {
        if (String(obj.value).startsWith("10")) return state.sprites.slot10;
        if (String(obj.value).startsWith("20")) return state.sprites.slot20;
        return state.sprites.slot50;
      }
      return null;
    }

    function drawImageCentered(img, x, y, w, h, angle = 0) {
      if (!img) return;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(degToRad(angle));
      ctx.drawImage(img, -w / 2, -h / 2, w, h);
      ctx.restore();
    }

    function drawBumper(obj, img) {
      const hitAt = state.bumperHits.get(obj.id);
      const age = hitAt ? (performance.now() - hitAt) / 360 : Infinity;
      const pulse = age < 1 ? 1 - age : 0;
      const snapPulse = age < 0.12 ? age / 0.12 : Math.pow(Math.max(0, 1 - (age - 0.12) / 0.88), 3.2);
      if (hitAt && age >= 1) state.bumperHits.delete(obj.id);

      if (pulse > 0) {
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.strokeStyle = `rgba(90, 188, 255, ${0.42 * pulse})`;
        ctx.fillStyle = `rgba(70, 150, 255, ${0.15 * pulse})`;
        ctx.lineWidth = 5 + 12 * pulse;
        ctx.beginPath();
        ctx.arc(obj.x, obj.y, obj.r * (1.1 + 0.95 * (1 - pulse)), 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      const scale = 1 + 0.36 * snapPulse;
      drawImageCentered(img, obj.x, obj.y, obj.r * 2 * scale, obj.r * 2 * scale);
    }

    function slotRewardTheme(value) {
      const text = String(value);
      if (text.startsWith("10")) {
        return {
          label: "+10",
          core: "196, 112, 58",
          edge: "255, 196, 128",
          text: "#d47b3f",
          shadow: "rgba(95, 45, 18, 0.38)"
        };
      }
      if (text.startsWith("20")) {
        return {
          label: "+20",
          core: "210, 219, 226",
          edge: "255, 255, 255",
          text: "#dce7ef",
          shadow: "rgba(64, 84, 96, 0.36)"
        };
      }
      return {
        label: "+50",
        core: "245, 190, 72",
        edge: "255, 239, 166",
        text: "#ffd166",
        shadow: "rgba(105, 69, 10, 0.4)"
      };
    }

    function slotHitProgress(obj) {
      const hitAt = state.slotHits.get(obj.id);
      if (hitAt == null) return null;
      const age = (performance.now() - hitAt) / SLOT_HIT_DURATION;
      if (age >= 1) {
        state.slotHits.delete(obj.id);
        return null;
      }
      return { age, pulse: 1 - age };
    }

    function drawSlot(obj, img) {
      const hit = slotHitProgress(obj);
      const age = hit?.age ?? Infinity;
      const pulse = hit?.pulse ?? 0;

      if (pulse > 0) {
        const jitter = Math.sin(age * Math.PI * 18) * 2.8 * pulse;
        const lift = -Math.sin(age * Math.PI) * 4 * pulse;
        drawImageCentered(img, obj.x + jitter, obj.y + lift, obj.w * (1 + 0.035 * pulse), obj.h * (1 + 0.05 * pulse), obj.angle || 0);
        return;
      }

      drawImageCentered(img, obj.x, obj.y, obj.w, obj.h, obj.angle || 0);
    }

    function drawSlotRewardGlow(obj) {
      const hit = slotHitProgress(obj);
      if (!hit) return;
      const { age, pulse } = hit;
      const theme = slotRewardTheme(obj.value);
      const beamHeight = 230;
      const rise = age * 18;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const beam = ctx.createLinearGradient(obj.x, obj.y + obj.h * 0.35, obj.x, obj.y - beamHeight);
      beam.addColorStop(0, `rgba(${theme.core}, ${0.48 * pulse})`);
      beam.addColorStop(0.36, `rgba(${theme.edge}, ${0.28 * pulse})`);
      beam.addColorStop(0.72, `rgba(${theme.edge}, ${0.12 * pulse})`);
      beam.addColorStop(1, `rgba(${theme.edge}, 0)`);
      ctx.fillStyle = beam;
      ctx.beginPath();
      ctx.ellipse(obj.x, obj.y - beamHeight * 0.43 - rise, obj.w * (0.76 + 0.22 * pulse), beamHeight * 0.72, 0, 0, Math.PI * 2);
      ctx.fill();

      const baseGlow = ctx.createRadialGradient(obj.x, obj.y, 0, obj.x, obj.y, Math.max(obj.w, obj.h) * 1.18);
      baseGlow.addColorStop(0, `rgba(${theme.edge}, ${0.28 * pulse})`);
      baseGlow.addColorStop(0.38, `rgba(${theme.core}, ${0.24 * pulse})`);
      baseGlow.addColorStop(1, `rgba(${theme.core}, 0)`);
      ctx.fillStyle = baseGlow;
      ctx.beginPath();
      ctx.ellipse(obj.x, obj.y - 2, obj.w * 0.88, obj.h * 1.18, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawSlotRewardText(obj) {
      const hit = slotHitProgress(obj);
      if (!hit) return;
      const { age } = hit;
      const theme = slotRewardTheme(obj.value);
      const textAlpha = Math.max(0, 1 - age);
      const textY = obj.y - 30 - age * 96;
      ctx.save();
      ctx.globalAlpha = textAlpha;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 30px Gotham, Montserrat, Avenir Next, ui-sans-serif, system-ui, sans-serif";
      ctx.lineWidth = 6;
      ctx.strokeStyle = theme.shadow;
      ctx.fillStyle = theme.text;
      ctx.shadowColor = `rgba(${theme.edge}, ${0.58 * textAlpha})`;
      ctx.shadowBlur = 22;
      ctx.strokeText(theme.label, obj.x, textY);
      ctx.fillText(theme.label, obj.x, textY);
      ctx.restore();
    }

    function drawObject(obj) {
      const img = imageForObject(obj);
      if (obj.type === "bumper") {
        drawBumper(obj, img);
        return;
      }

      if (obj.type === "peg") {
        drawImageCentered(img, obj.x, obj.y, obj.r * 2, obj.r * 2);
        return;
      }

      if (obj.type === "wall") {
        if (obj.id === "piso") {
          drawImageCentered(img, obj.x, obj.y, obj.w, obj.h, obj.angle || 0);
        } else {
          drawImageCentered(img, obj.x, obj.y, Math.min(obj.w, obj.h), Math.max(obj.w, obj.h), 0);
        }
        return;
      }

      if (obj.type === "slot") {
        drawSlot(obj, img);
      }
    }

    function drawDebugBody(body) {
      const obj = body.plugin?.blueprint;
      if (!obj || body.label.startsWith("ball:")) return;
      ctx.save();
      ctx.strokeStyle = obj.type === "slot" ? "rgba(18,111,107,0.55)" : "rgba(214,61,43,0.58)";
      ctx.lineWidth = 1.5;
      if (body.circleRadius) {
        ctx.beginPath();
        ctx.arc(body.position.x, body.position.y, body.circleRadius, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.beginPath();
        body.vertices.forEach((v, i) => i ? ctx.lineTo(v.x, v.y) : ctx.moveTo(v.x, v.y));
        ctx.closePath();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBall(body) {
      const r = state.level.board.ballRadius;
      drawImageCentered(state.sprites.ball, body.position.x, body.position.y, r * 2, r * 2, body.angle * 180 / Math.PI);
    }

    function drawBallTrails() {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      state.trails.forEach((trail) => {
        if (trail.length < 2) return;
        for (let i = 1; i < trail.length; i += 1) {
          const prev = trail[i - 1];
          const point = trail[i];
          const t = i / (trail.length - 1);
          const alpha = clamp(point.life * t * 0.38, 0, 0.38);
          ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
          ctx.lineWidth = 2 + t * 8 + clamp(point.speed, 0, 12) * 0.18;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(prev.x, prev.y);
          ctx.lineTo(point.x, point.y);
          ctx.stroke();
        }
      });
      ctx.restore();
    }

    function draw() {
      const level = state.level;
      const { width, height, cornerRadius } = level.board;
      const scale = canvas.clientWidth / width;
      canvas.width = Math.round(width * scale * dpr);
      canvas.height = Math.round(height * scale * dpr);
      ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      drawRoundRect(ctx, 0, 0, width, height, cornerRadius || 0);
      ctx.clip();
      ctx.drawImage(state.images.board, 0, 0, width, height);

      level.objects.filter((obj) => obj.type === "slot").forEach(drawSlotRewardGlow);
      level.objects.filter((obj) => obj.type === "slot").forEach(drawObject);
      level.objects.filter((obj) => obj.type === "wall").forEach(drawObject);
      level.objects.filter((obj) => obj.type === "peg").forEach(drawObject);
      level.objects.filter((obj) => obj.type === "bumper").forEach(drawObject);

      drawBallTrails();

      Composite.allBodies(state.engine.world)
        .filter((body) => body.label?.startsWith("ball:"))
        .forEach(drawBall);

      level.objects.filter((obj) => obj.type === "slot").forEach(drawSlotRewardText);

      if (state.debug) Composite.allBodies(state.engine.world).forEach(drawDebugBody);

      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.7)";
      ctx.lineWidth = 2;
      drawRoundRect(ctx, 1, 1, width - 2, height - 2, Math.max(0, (cornerRadius || 0) - 1));
      ctx.stroke();
      ctx.restore();
    }

    function tick() {
      Engine.update(state.engine, 1000 / 60);
      updateTrails();
      Composite.allBodies(state.engine.world).forEach((body) => {
        if (body.label?.startsWith("ball:") && body.position.y > state.level.board.height + 140) {
          World.remove(state.engine.world, body);
        }
      });
      draw();
      state.raf = requestAnimationFrame(tick);
    }

    function spawnBall(x = state.lastSpawnX ?? state.level.spawn.x) {
      const level = state.level;
      playSfx("newball", 0.92);
      const ball = Bodies.circle(x, level.spawn.y, level.board.ballRadius, {
        label: `ball:${Date.now()}:${Math.random().toString(16).slice(2)}`,
        restitution: 0.02,
        friction: 0.018,
        frictionAir: 0.002,
        density: 0.004
      });
      Body.setVelocity(ball, { x: (Math.random() - 0.5) * 2, y: 0 });
      Composite.add(state.engine.world, ball);
    }

    function reset() {
      if (state.raf) cancelAnimationFrame(state.raf);
      if (state.engine) {
        World.clear(state.engine.world, false);
        Engine.clear(state.engine);
      }
      state.scores = {};
      state.scored = new Set();
      state.bumperHits = new Map();
      state.trails = new Map();
      state.slotHits = new Map();
      state.engine = makeEngine(state.level);
      updateHud();
      tick();
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function resampleImage(img, width, height) {
      const targetWidth = Math.max(1, Math.round(width));
      const targetHeight = Math.max(1, Math.round(height));
      let source = img;
      let sourceWidth = img.naturalWidth || img.width;
      let sourceHeight = img.naturalHeight || img.height;

      while (sourceWidth / 2 > targetWidth * 1.25 && sourceHeight / 2 > targetHeight * 1.25) {
        const step = document.createElement("canvas");
        step.width = Math.max(targetWidth, Math.round(sourceWidth / 2));
        step.height = Math.max(targetHeight, Math.round(sourceHeight / 2));
        const stepContext = step.getContext("2d");
        stepContext.imageSmoothingEnabled = true;
        stepContext.imageSmoothingQuality = "high";
        stepContext.drawImage(source, 0, 0, step.width, step.height);
        source = step;
        sourceWidth = step.width;
        sourceHeight = step.height;
      }

      const canvasEl = document.createElement("canvas");
      canvasEl.width = targetWidth;
      canvasEl.height = targetHeight;
      const context = canvasEl.getContext("2d");
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = "high";
      context.drawImage(source, 0, 0, targetWidth, targetHeight);
      return canvasEl;
    }

    function maxObjectSize(level, predicate, fallback) {
      const size = level.objects.reduce((acc, obj) => {
        if (!predicate(obj)) return acc;
        const w = obj.r ? obj.r * 2 : obj.w || 0;
        const h = obj.r ? obj.r * 2 : obj.h || 0;
        return { w: Math.max(acc.w, w), h: Math.max(acc.h, h) };
      }, { w: 0, h: 0 });
      return {
        w: size.w || fallback.w,
        h: size.h || fallback.h
      };
    }

    function makeSprites(images, level) {
      const spriteScale = Math.min(4, Math.max(2, Math.ceil(window.devicePixelRatio || 1)));
      const ball = { w: level.board.ballRadius * 2, h: level.board.ballRadius * 2 };
      const peg = maxObjectSize(level, (obj) => obj.type === "peg", { w: 14, h: 14 });
      const bumper = maxObjectSize(level, (obj) => obj.type === "bumper", { w: 60, h: 60 });
      const divider = maxObjectSize(level, (obj) => obj.type === "wall" && obj.id !== "piso", { w: 20, h: 120 });
      const floor = maxObjectSize(level, (obj) => obj.id === "piso", { w: level.board.width, h: 51 });
      const slot10 = maxObjectSize(level, (obj) => obj.type === "slot" && String(obj.value).startsWith("10"), { w: 128, h: 57 });
      const slot20 = maxObjectSize(level, (obj) => obj.type === "slot" && String(obj.value).startsWith("20"), { w: 128, h: 57 });
      const slot50 = maxObjectSize(level, (obj) => obj.type === "slot" && String(obj.value) === "50", { w: 128, h: 57 });

      return {
        ball: resampleImage(images.ball, ball.w * spriteScale, ball.h * spriteScale),
        peg: resampleImage(images.peg, peg.w * spriteScale, peg.h * spriteScale),
        bumper: resampleImage(images.bumper, bumper.w * spriteScale, bumper.h * spriteScale),
        divider: resampleImage(images.divider, divider.w * spriteScale, divider.h * spriteScale),
        floor: resampleImage(images.floor, floor.w * spriteScale, floor.h * spriteScale),
        slot10: resampleImage(images.slot10, slot10.w * spriteScale, slot10.h * spriteScale),
        slot20: resampleImage(images.slot20, slot20.w * spriteScale, slot20.h * spriteScale),
        slot50: resampleImage(images.slot50, slot50.w * spriteScale, slot50.h * spriteScale)
      };
    }

    async function loadLevel() {
      try {
        const response = await fetch("preview-level.json", { cache: "no-store" });
        if (response.ok) return response.json();
      } catch (_) {}

      return typeof structuredClone === "function"
        ? structuredClone(embeddedLevel)
        : JSON.parse(JSON.stringify(embeddedLevel));
    }

    async function init() {
      const [level, loadedImages] = await Promise.all([
        loadLevel(),
        Promise.all(Object.entries(assetPaths).map(async ([key, src]) => [key, await loadImage(src)]))
      ]);
      state.level = level;
      state.images = Object.fromEntries(loadedImages);
      state.sprites = makeSprites(state.images, level);
      reset();
    }

    rollButton.addEventListener("click", rollSelected);
    document.querySelectorAll(".multiplier").forEach((button) => {
      button.addEventListener("click", () => {
        playSfx("button", 0.78);
        setSelectedCount(Number(button.dataset.count));
      });
    });

    init().catch((error) => {
      console.error(error);
      showToast(error.message || "No se pudo cargar");
    });
  </script>
</body>
</html>
