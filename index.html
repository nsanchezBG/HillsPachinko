<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hill's Pachinko DOM</title>
  <style>
    :root {
      --brand-font: "Gotham", "Gotham SSm", "Gotham Rounded", "Montserrat", "Avenir Next", "Proxima Nova", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --blue: #2d6eb8;
      --blue-mid: #3478c6;
      --blue-dark: #1d5599;
      --paper: #f8fbff;
      --paper-low: #e8eef8;
      --press-time: 110ms;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: start center;
      min-height: 100dvh;
      padding: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 32%),
        linear-gradient(145deg, #3b7fc7 0%, var(--blue) 42%, #205a9e 72%, #174986 100%);
      color: #07111f;
      font-family: var(--brand-font);
      overflow: auto;
      text-rendering: geometricPrecision;
    }

    .machine {
      position: relative;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: clamp(8px, 1.55vh, 13px);
      width: calc(100vw - 20px);
      max-width: 455px;
      padding: clamp(10px, 1.6vh, 14px) clamp(10px, 2.4vw, 14px) clamp(10px, 1.8vh, 14px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: clamp(20px, 5vw, 28px);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0) 20%),
        linear-gradient(180deg, var(--blue-mid) 0%, var(--blue) 44%, var(--blue-dark) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), inset 0 -10px 22px rgba(9,48,98,0.24), 0 2px 0 rgba(255,255,255,0.12), 0 26px 64px rgba(4,30,66,0.42);
    }

    .board-frame {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      margin-top: clamp(18px, 4.6vw, 26px);
      padding: clamp(7px, 1.8vw, 10px);
      border-radius: clamp(38px, 9vw, 52px);
      background: linear-gradient(130deg, #ffffff 0%, #cad4df 13%, #6f7f91 25%, #f7fbff 39%, #a7b2bf 54%, #ffffff 69%, #788696 83%, #d7e1eb 100%);
      box-shadow: inset 0 3px 0 rgba(255,255,255,0.95), inset 0 -4px 0 rgba(47,60,76,0.54), inset 3px 0 4px rgba(255,255,255,0.62), inset -4px 0 7px rgba(49,64,82,0.36), 0 2px 0 rgba(255,255,255,0.28), 0 7px 0 rgba(3,31,70,0.34), 0 14px 18px rgba(0,18,47,0.48);
    }

    .board-blue-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      overflow: hidden;
      padding: clamp(3px, 0.8vw, 5px) clamp(15px, 4vw, 22px) clamp(5px, 1.4vw, 8px);
      border-radius: clamp(32px, 8vw, 45px);
      background: linear-gradient(90deg, #022353 0%, #0859b5 7%, #0a73d8 12%, #064086 18%, #064086 82%, #0a73d8 88%, #0859b5 93%, #022353 100%);
      box-shadow: inset 0 2px 0 rgba(112,184,255,0.46), inset 0 -5px 10px rgba(0,16,48,0.64), inset 8px 0 14px rgba(0,16,48,0.58), inset -8px 0 14px rgba(0,16,48,0.58), 0 1px 0 rgba(255,255,255,0.38);
    }

    .board-inner-frame {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: clamp(6px, 1.6vw, 9px);
      border-radius: clamp(29px, 7.4vw, 40px);
      background: linear-gradient(145deg, #ffffff 0%, #dce5ef 15%, #8a99aa 28%, #ffffff 43%, #c5cfda 59%, #768799 74%, #f7fbff 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.96), inset 0 -3px 0 rgba(51,66,84,0.5), inset 3px 0 5px rgba(255,255,255,0.68), inset -4px 0 7px rgba(50,65,84,0.28), 0 0 0 1px rgba(255,255,255,0.42), 0 4px 8px rgba(0,24,62,0.28);
    }

    .board-logo-plaque {
      position: absolute;
      z-index: 20;
      top: clamp(-48px, -10.6vw, -38px);
      left: 50%;
      display: grid;
      place-items: center;
      width: clamp(101px, 26.1vw, 122px);
      height: clamp(82px, 21vw, 100px);
      padding: 10px 14px 15px;
      transform: translateX(-50%);
      border: 2px solid transparent;
      border-radius: 0 0 17px 17px;
      background: linear-gradient(180deg, #fff 0%, #fbfdff 46%, #e5edf5 75%, #cbd7e4 100%) padding-box, linear-gradient(135deg, #fff 0%, #bac6d3 23%, #f7fbff 48%, #8b99a8 75%, #fff 100%) border-box;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.98), inset 0 -10px 18px rgba(43,67,94,0.18), 0 5px 0 rgba(28,55,91,0.2), 0 13px 18px rgba(4,29,69,0.26);
    }
    .board-logo-plaque img { display: block; width: 92%; height: 92%; object-fit: contain; }

    #playfield {
      position: relative;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 720 / 960;
      border-radius: clamp(23px, 6.4vw, 34px);
      background: #fbf8f2 url("Assets/board-bg.png") center / 100% 100% no-repeat;
      contain: layout paint style;
      transform: translateZ(0);
      box-shadow: inset 0 0 0 1px rgba(34,64,92,0.24), 0 1px 0 rgba(255,255,255,0.96), 0 10px 20px rgba(5,30,66,0.18);
      touch-action: manipulation;
    }
    #staticCanvas,
    #gameCanvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      transform: translateZ(0);
    }
    #staticCanvas { z-index: 1; }
    #gameCanvas { z-index: 2; }

    .entity {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: center;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      will-change: transform;
      contain: layout paint style;
      image-rendering: auto;
    }
    .static { will-change: auto; }
    .ball { z-index: 9; }
    .peg { z-index: 3; }
    .bumper { z-index: 5; }
    .slot { z-index: 6; }
    .wall { z-index: 7; }
    .piso { z-index: 1; }
    .reward {
      position: absolute;
      z-index: 12;
      left: 0;
      top: 0;
      color: #ffd166;
      font-weight: 950;
      font-size: 30px;
      line-height: 1;
      text-shadow: 0 2px 0 rgba(76,40,0,0.4);
      transform: translate3d(-50%, -50%, 0);
      pointer-events: none;
      will-change: transform, opacity;
    }

    .hud { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: clamp(9px, 2.6vw, 13px); min-height: clamp(106px, 15.5vh, 124px); }
    button { border: 0; color: #07111f; font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
    button:disabled { cursor: not-allowed; filter: grayscale(0.35); opacity: 0.62; }

    .score-card {
      justify-self: start; position: relative; overflow: hidden; display: grid; place-items: center; width: 100%; min-width: 0; height: clamp(94px, 13.7vh, 108px); border: 1px solid rgba(255,255,255,0.82); border-radius: clamp(18px,5vw,24px); background: linear-gradient(180deg,#fff 0%,var(--paper) 45%,var(--paper-low) 100%); box-shadow: inset 0 2px 0 rgba(255,255,255,0.95), inset 0 -8px 15px rgba(41,74,115,0.12), 0 7px 0 rgba(10,49,101,0.42), 0 18px 28px rgba(8,35,75,0.22);
    }
    .score-card::before { content: ""; position: absolute; inset: 0 0 auto; height: 45%; background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0)); pointer-events: none; }
    .score-card > div { position: relative; z-index: 1; display: grid; justify-items: center; gap: 6px; }
    .score-label { display: inline-flex; align-items: center; justify-content: center; gap: 7px; color: #074c9f; font-size: clamp(17px,4.7vw,22px); line-height: 1; font-weight: 850; }
    .score-card strong { display: block; color: #074c9f; font-size: clamp(39px,10vw,52px); line-height: 0.82; font-weight: 950; font-variant-numeric: tabular-nums; }
    .paw-icon { width: 0.5em; height: 0.5em; object-fit: contain; flex: 0 0 auto; }
    .paw-blue { filter: invert(23%) sepia(96%) saturate(1661%) hue-rotate(194deg) brightness(88%) contrast(101%); opacity: 0.5; }
    .paw-white { filter: invert(1) drop-shadow(0 1px 0 rgba(98,0,22,0.35)); opacity: 0.78; }

    .roll {
      justify-self: end; position: relative; overflow: hidden; display: grid; place-items: center; width: min(164px,37vw); min-width: 128px; height: clamp(84px,12.4vh,98px); border: 2px solid rgba(255,255,255,0.78); border-radius: clamp(28px,7.4vw,42px); background: radial-gradient(ellipse at 50% 17%, rgba(255,255,255,0.62), rgba(255,255,255,0.08) 33%, rgba(255,255,255,0) 49%), linear-gradient(180deg,#ff5e66 0%,#ed1c35 48%,#b90d27 100%); box-shadow: inset 0 3px 0 rgba(255,255,255,0.42), inset 0 0 0 2px rgba(255,255,255,0.18), inset 0 -12px 16px rgba(80,0,18,0.28), 0 8px 0 rgba(108,7,29,0.95), 0 12px 12px rgba(0,16,44,0.52); transition: transform var(--press-time) ease;
    }
    .roll:active:not(:disabled) { transform: translateY(6px) scale(0.985); }
    .roll-text { position: relative; z-index: 1; display: grid; justify-items: center; gap: 6px; }
    .roll-text strong { font-size: clamp(27px,7.8vw,36px); line-height: 0.9; font-weight: 950; color: #fff; text-shadow: 0 2px 0 rgba(77,0,18,0.32); }
    .roll-cost { display: inline-flex; align-items: center; justify-content: center; gap: 5px; font-size: clamp(14px,4vw,19px); line-height: 1; font-weight: 900; color: rgba(255,255,255,0.94); }

    .multipliers { display: grid; grid-template-columns: repeat(5, 1fr); gap: clamp(6px,1.8vw,9px); width: 100%; }
    .multiplier { min-width: 0; height: clamp(48px,7.4vh,60px); border: 4px solid transparent; border-radius: clamp(9px,2.5vw,12px); background: linear-gradient(90deg, rgba(46,66,88,0.38), rgba(255,255,255,0.78) 11%, rgba(255,255,255,0) 24%, rgba(0,0,0,0.1) 100%) padding-box, linear-gradient(180deg,var(--m-top) 0%,var(--m-mid) 54%,var(--m-bottom) 100%) padding-box, linear-gradient(135deg,#fff 0%,#c9d2dc 16%,#6e7a88 31%,#fff 48%,#b7c0ca 62%,#5d6976 79%,#eef4fb 100%) border-box; color: var(--m-ink,#080b10); font-size: clamp(24px,6.8vw,34px); line-height: 1; font-weight: 650; box-shadow: inset 0 2px 0 rgba(255,255,255,0.56), inset 0 -6px 10px rgba(0,0,0,0.09), 0 7px 0 var(--m-edge), 0 10px 10px rgba(0,16,44,0.42); transition: transform var(--press-time) ease; }
    .multiplier[data-count="1"] { --m-top:#fff; --m-mid:#eef3fb; --m-bottom:#d7e0ed; --m-edge:#aeb9c8; --m-ink:#074c9f; }
    .multiplier[data-count="2"] { --m-top:#fff; --m-mid:#cfd8e2; --m-bottom:#9ca9b6; --m-edge:#637080; --m-ink:#074c9f; }
    .multiplier[data-count="3"] { --m-top:#ffe889; --m-mid:#f6c532; --m-bottom:#d9a21b; --m-edge:#a77815; --m-ink:#074c9f; }
    .multiplier[data-count="5"] { --m-top:#ffb15f; --m-mid:#f5822e; --m-bottom:#d9651e; --m-edge:#a44716; --m-ink:#fff; }
    .multiplier[data-count="10"] { --m-top:#ff8b51; --m-mid:#f05d25; --m-bottom:#cb4218; --m-edge:#963011; --m-ink:#fff; }
    .multiplier.active { transform: translateY(-2px); filter: saturate(1.06); outline: 2px solid rgba(255,255,255,0.9); }
    .multiplier:active { transform: translateY(5px); }

    .toast { position: absolute; left: 50%; bottom: 166px; transform: translateX(-50%); min-width: 158px; padding: 10px 15px; border: 1px solid rgba(255,255,255,0.74); border-radius: 999px; background: linear-gradient(180deg,rgba(255,255,255,0.97),rgba(234,241,251,0.94)); color: #183a68; font-size: 13px; font-weight: 850; text-align: center; opacity: 0; pointer-events: none; transition: opacity 180ms ease, transform 180ms ease; }
    .toast.show { opacity: 1; transform: translate(-50%, -5px); }

    .machine.slot-impact .score-card { animation: ui-impact-left 350ms cubic-bezier(0.18,0.88,0.26,1) 18ms both; }
    .machine.slot-impact .roll { animation: ui-impact-right 410ms cubic-bezier(0.18,0.88,0.26,1) 62ms both; }
    @keyframes ui-impact-left { 0%{transform:translate3d(0,0,0) scale(1)} 23%{transform:translate3d(1.2px,-0.8px,0) scale(1.006)} 49%{transform:translate3d(-0.8px,1px,0) scale(0.998)} 100%{transform:translate3d(0,0,0) scale(1)} }
    @keyframes ui-impact-right { 0%{transform:translate3d(0,0,0) scale(1)} 19%{transform:translate3d(-1px,0.8px,0) scale(1.005)} 44%{transform:translate3d(1.3px,-0.6px,0) scale(0.999)} 100%{transform:translate3d(0,0,0) scale(1)} }

    @media (max-width: 430px) {
      body { padding: 8px; }
      .machine { width: calc(100vw - 16px); padding: 9px; }
      .hud { gap: 7px; min-height: 94px; }
      .score-card { height: 88px; }
      .score-label { gap: 5px; font-size: 17px; }
      .score-card strong { font-size: 39px; }
      .roll { min-width: 126px; width: 36vw; height: 76px; }
      .roll-text strong { font-size: 27px; }
      .roll-cost { gap: 5px; font-size: 14px; }
      .multipliers { gap: 6px; }
      .multiplier { height: 48px; }
    }
  </style>
</head>
<body>
  <main class="machine">
    <section class="board-frame" aria-label="Pachinko">
      <div class="board-logo-plaque" aria-hidden="true"><img src="Assets/logohills.png" alt="" /></div>
      <div class="board-blue-shell"><div class="board-inner-frame"><div id="playfield"><canvas id="staticCanvas" width="720" height="960"></canvas><canvas id="gameCanvas" width="720" height="960"></canvas></div></div></div>
    </section>
    <section class="hud" aria-label="Estado del juego">
      <div class="score-card" aria-live="polite"><div><span class="score-label"><img class="paw-icon paw-blue" src="Assets/huella.png" alt="" />PUNTOS<img class="paw-icon paw-blue" src="Assets/huella.png" alt="" /></span><strong id="points">150</strong></div></div>
      <button id="roll" class="roll" type="button"><span class="roll-text"><strong>TIRAR</strong><span class="roll-cost"><img class="paw-icon paw-white" src="Assets/huella.png" alt="" /><span id="rollCost">15 pts</span><img class="paw-icon paw-white" src="Assets/huella.png" alt="" /></span></span></button>
    </section>
    <section class="multipliers" aria-label="Cantidad de bolas">
      <button class="multiplier active" data-count="1" type="button">x1</button><button class="multiplier" data-count="2" type="button">x2</button><button class="multiplier" data-count="3" type="button">x3</button><button class="multiplier" data-count="5" type="button">x5</button><button class="multiplier" data-count="10" type="button">x10</button>
    </section>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

    const ASSETS = { bg:'Assets/board-bg.png', ball:'Assets/ball.png', peg:'Assets/pin.png', bumper:'Assets/bumper.png', divider:'Assets/slot-divider.png', floor:'Assets/piso.png', slot10:'Assets/slot-10.png', slot20:'Assets/slot-20.png', slot50:'Assets/slot-50.png' };
    const SFX = { bumper:'Assets/bumper.mp3', button:'Assets/button.mp3', newball:'Assets/newball.mp3', slot:'Assets/slot.mp3' };
    const staticCanvas = document.getElementById('staticCanvas');
    const staticCtx = staticCanvas.getContext('2d', { alpha: false, desynchronized: true });
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: true, desynchronized: true });
    const pointsEl = document.getElementById('points');
    const rollButton = document.getElementById('roll');
    const rollCostEl = document.getElementById('rollCost');
    const toastEl = document.getElementById('toast');
    const machineEl = document.querySelector('.machine');
    const W = LEVEL.board.width, H = LEVEL.board.height;
    const state = { points: CONFIG.startingPoints, selectedCount: 1, routeCursor: Math.floor(Math.random()*ROUTES.length), balls: [], nextBallId: 1, rewards: [], slotFx: [], bumperHits: new Map(), lastFrameAt: null, raf: null, sfx: {}, timers: {}, images: {}, sprites: {}, slotSensors: LEVEL.objects.filter(o=>o.type==='slot') };

    function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
    function degToRad(d){return (Number(d)||0)*Math.PI/180;}
    function slotPoints(v){const m=String(v).match(/\d+/);return m?Number(m[0]):0;}
    function fmt(v){return Math.max(0,Math.floor(v)).toLocaleString('es-CO');}
    function cost(){return state.selectedCount*CONFIG.ballCost;}
    function slotAsset(obj){return String(obj.value).startsWith('10')?state.images.slot10:String(obj.value).startsWith('20')?state.images.slot20:state.images.slot50;}
    function routeDuration(route){return Math.max(route.d || 0, ((route.p.length/2)-1)*CONFIG.routeSampleMs);}

    function loadImages(){
      return Promise.all(Object.entries(ASSETS).map(([name,src]) => new Promise(resolve => {
        const img = new Image(); img.onload = () => resolve([name,img]); img.onerror = () => resolve([name,img]); img.decoding = 'async'; img.src = src;
      }))).then(entries => { state.images = Object.fromEntries(entries); });
    }
    function makeSfx(){ state.sfx = Object.fromEntries(Object.entries(SFX).map(([name,src]) => [name,{i:0,pool:Array.from({length:name==='bumper'?5:3},()=>{const a=new Audio(src);a.preload='auto';a.volume=name==='button'?0.42:name==='bumper'?0.58:0.7;return a;})}])); }
    function playSfx(name, volume=1){const s=state.sfx[name]; if(!s)return; const a=s.pool[s.i]; s.i=(s.i+1)%s.pool.length; try{a.pause();a.currentTime=0;a.volume=clamp(volume*(name==='button'?0.42:name==='bumper'?0.58:0.7),0,1);a.play().catch(()=>{});}catch(_){} }

    function makeSprite(img,w,h){
      const spr=document.createElement('canvas');
      spr.width=Math.max(1,Math.round(w));
      spr.height=Math.max(1,Math.round(h));
      const c=spr.getContext('2d',{alpha:true});
      c.imageSmoothingEnabled=true;
      c.imageSmoothingQuality='high';
      c.drawImage(img,0,0,spr.width,spr.height);
      return spr;
    }
    function buildSprites(){
      state.sprites.ball=makeSprite(state.images.ball,LEVEL.board.ballRadius*2,LEVEL.board.ballRadius*2);
      state.sprites.bumper=makeSprite(state.images.bumper,60,60);
    }
    function drawImageBox(c,img,x,y,w,h,angle=0,scale=1){ if(!img)return; c.save(); c.translate(x,y); c.rotate(degToRad(angle)); c.scale(scale,scale); c.drawImage(img,-w/2,-h/2,w,h); c.restore(); }
    function drawObj(c,obj,scale=1){
      if(obj.type==='peg') drawImageBox(c,state.images.peg,obj.x,obj.y,obj.r*2,obj.r*2,0,scale);
      else if(obj.type==='bumper') drawImageBox(c,state.images.bumper,obj.x,obj.y,obj.r*2,obj.r*2,0,scale);
      else if(obj.type==='slot') drawImageBox(c,slotAsset(obj),obj.x,obj.y,obj.w,obj.h,obj.angle||0,scale);
      else if(obj.id==='piso') drawImageBox(c,state.images.floor,obj.x,obj.y,obj.w,obj.h,obj.angle||0,scale);
      else if(obj.type==='wall') drawImageBox(c,state.images.divider,obj.x,obj.y,Math.min(obj.w,obj.h),Math.max(obj.w,obj.h),0,scale);
    }
    function buildLayers(){
      staticCtx.imageSmoothingEnabled=true;
      staticCtx.imageSmoothingQuality='high';
      staticCtx.drawImage(state.images.bg,0,0,W,H);
      LEVEL.objects.forEach(obj=>{ if(obj.type==='peg'||obj.type==='bumper'||obj.id==='piso') drawObj(staticCtx,obj); });
      LEVEL.objects.filter(o=>o.type==='slot').forEach(obj=>drawObj(staticCtx,obj));
      LEVEL.objects.filter(o=>o.type==='wall'&&o.id!=='piso').forEach(obj=>drawObj(staticCtx,obj));
    }

    function updateHud(){pointsEl.textContent=fmt(state.points); rollCostEl.textContent=cost()+' pts'; rollButton.disabled=state.points<cost(); document.querySelectorAll('.multiplier').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.count)===state.selectedCount));}
    let toastTimer=null; function showToast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1400);}
    function trigger(cls,dur){machineEl.classList.remove(cls); void machineEl.offsetWidth; machineEl.classList.add(cls); clearTimeout(state.timers[cls]); state.timers[cls]=setTimeout(()=>machineEl.classList.remove(cls),dur);}
    function nextRoute(){ const route=ROUTES[state.routeCursor++ % ROUTES.length]; return route; }
    function sampleRoute(route, elapsed){
      const p=route.p, frame=elapsed/CONFIG.routeSampleMs, i=Math.floor(frame), mix=frame-i, max=(p.length/2)-1;
      const a=Math.max(0,Math.min(i,max)), b=Math.max(0,Math.min(i+1,max));
      const ax=p[a*2], ay=p[a*2+1], bx=p[b*2], by=p[b*2+1];
      return {x: ax+(bx-ax)*mix, y: ay+(by-ay)*mix};
    }
    function recordBumper(objIndex){ state.bumperHits.set(objIndex, performance.now()); playSfx('bumper',0.75); }
    function rewardText(slot){ state.rewards.push({x:slot.x,y:slot.y-30,age:0,text:'+'+slotPoints(slot.value),color:String(slot.value).startsWith('10')?'#d47b3f':String(slot.value).startsWith('20')?'#dce7ef':'#ffd166'}); }
    function scoreSlot(slot){ state.points+=slotPoints(slot.value); playSfx('slot'); rewardText(slot); state.slotFx.push({slot,age:0,color:String(slot.value).startsWith('10')?'rgba(212,123,63,':String(slot.value).startsWith('20')?'rgba(220,231,239,':'rgba(255,209,102,'}); trigger('slot-impact',520); updateHud(); }
    function spawnBall(){ playSfx('newball',0.85); state.balls.push({id:state.nextBallId++,route:nextRoute(),start:performance.now(),eventIndex:0,angle:0,spin:(Math.random()-0.5)*0.12,done:false}); }
    function roll(){ playSfx('button',0.9); const c=cost(); if(state.points<c){showToast('Puntos insuficientes');return;} state.points-=c; updateHud(); const n=state.selectedCount; for(let i=0;i<n;i++)setTimeout(spawnBall,i*85); }

    function processEvents(ball, elapsed){
      const events=ball.route.e || [];
      while(ball.eventIndex<events.length && events[ball.eventIndex][0]<=elapsed){
        const evt=events[ball.eventIndex++];
        if(evt[1]===0) recordBumper(evt[2]);
        else if(evt[1]===1){ const slot=state.slotSensors[evt[2]]; if(slot) scoreSlot(slot); ball.done=true; }
      }
    }
    function drawSlotFx(elapsed){
      state.slotFx=state.slotFx.filter(fx=>{ fx.age+=elapsed; const p=fx.age/780; if(p>=1)return false; const alpha=(1-p)*0.34, h=155+60*p, y=fx.slot.y-fx.slot.h/2-h/2; const grad=ctx.createLinearGradient(fx.slot.x,y,fx.slot.x,fx.slot.y); grad.addColorStop(0,fx.color+'0)'); grad.addColorStop(0.35,fx.color+(alpha*0.55)+')'); grad.addColorStop(1,fx.color+alpha+')'); ctx.save(); ctx.globalCompositeOperation='screen'; ctx.fillStyle=grad; ctx.beginPath(); ctx.ellipse(fx.slot.x,y+h*0.52,fx.slot.w*0.58,h*0.52,0,0,Math.PI*2); ctx.fill(); ctx.restore(); return true; });
    }
    function drawBumpers(now){ LEVEL.objects.forEach((obj,objIndex)=>{ if(obj.type!=='bumper')return; const hit=state.bumperHits.get(objIndex); if(!hit)return; const p=Math.max(0,(now-hit)/95); if(p>=1){ state.bumperHits.delete(objIndex); return; } const scale=1+0.18*(1-p); drawImageBox(ctx,state.sprites.bumper,obj.x,obj.y,60,60,0,scale); }); }
    function drawBalls(now){ const img=state.sprites.ball; const r=LEVEL.board.ballRadius; state.balls.forEach(ball=>{ const elapsed=now-ball.start; const pt=sampleRoute(ball.route,elapsed); ball.angle+=ball.spin; ctx.save(); ctx.translate(pt.x,pt.y); ctx.rotate(ball.angle); ctx.drawImage(img,-r,-r,r*2,r*2); ctx.restore(); }); }
    function drawRewards(elapsed){ ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='950 30px Gotham, Montserrat, Arial, sans-serif'; ctx.shadowColor='rgba(76,40,0,0.4)'; ctx.shadowOffsetY=2; state.rewards=state.rewards.filter(r=>{ r.age+=elapsed; const p=r.age/850; if(p>=1)return false; ctx.globalAlpha=1-p; ctx.fillStyle=r.color; ctx.fillText(r.text,r.x,r.y-p*88); return true; }); ctx.restore(); ctx.globalAlpha=1; }
    function render(elapsed,now){ ctx.clearRect(0,0,W,H); drawBumpers(now); drawSlotFx(elapsed); drawBalls(now); drawRewards(elapsed); }
    function tick(t=performance.now()){
      const prev=state.lastFrameAt||t,elapsed=clamp(t-prev,0,80); state.lastFrameAt=t;
      state.balls.forEach(ball=>processEvents(ball,t-ball.start));
      state.balls=state.balls.filter(ball=>!ball.done && (t-ball.start)<routeDuration(ball.route)+150);
      render(elapsed,t);
      state.raf=requestAnimationFrame(tick);
    }
    function resize(){ render(0,performance.now()); }
    async function init(){ makeSfx(); await loadImages(); staticCanvas.width=W; staticCanvas.height=H; canvas.width=W; canvas.height=H; ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high'; buildSprites(); buildLayers(); updateHud(); render(0,performance.now()); tick(); }
    rollButton.addEventListener('click',roll);
    document.querySelectorAll('.multiplier').forEach(btn=>btn.addEventListener('click',()=>{playSfx('button',0.78);state.selectedCount=Number(btn.dataset.count);updateHud();}));
    window.addEventListener('resize',resize);
    init();
  </script>
</body>
</html>
